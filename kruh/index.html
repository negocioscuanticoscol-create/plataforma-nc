<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store">
<title>kruh · club del pan</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f5efe4; --card:#fffdf8; --ink:#2a1f16; --ink2:#5b4d3f; --mut:#9a8b78;
    --line:#e7ddc9; --line2:#f0e9da; --acc:#b5651d; --acc2:#d98b3f; --gold:#caa23c;
    --ok:#4f7a4a; --okbg:#e6f1e2; --warn:#b4622e; --bad:#a8392c; --badbg:#f7e2dd;
    --sh:0 1px 2px rgba(40,25,10,.05),0 12px 30px -18px rgba(40,25,10,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;font-variant-numeric:slashed-zero;font-feature-settings:'zero' 1}
  .wrap{max-width:920px;margin:0 auto;padding:0 15px 96px}
  header{background:var(--ink);color:var(--paper);padding:15px 0}
  .hd{max-width:920px;margin:0 auto;padding:0 15px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{font-family:Fraunces,Georgia,serif;font-size:28px;font-weight:600;letter-spacing:.01em;line-height:1}
  .brand b{color:var(--acc2)}
  .brand small{display:block;font-family:'IBM Plex Sans';font-size:9.5px;letter-spacing:.32em;color:var(--gold);margin-top:3px;text-transform:uppercase}
  .quien{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#b6a894;text-align:right}
  nav{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;overflow-x:auto}
  .nv{max-width:920px;margin:0 auto;display:flex;gap:1px;padding:0 8px}
  nav button{flex:0 0 auto;background:none;border:none;padding:13px 12px;font-size:12.5px;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;font-family:inherit}
  nav button.on{color:var(--ink);border-bottom-color:var(--acc)}
  h1{font-family:Fraunces,serif;font-size:25px;font-weight:600;margin:20px 0 2px}
  .sub{color:var(--mut);font-size:13px;margin-bottom:15px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px;margin-bottom:12px;box-shadow:var(--sh)}
  label{display:block;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin:9px 0 4px}
  input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-size:15px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
  textarea{min-height:60px;resize:vertical}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .btn{padding:12px 17px;border:none;border-radius:9px;background:var(--ink);color:var(--paper);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
  .btn.acc{background:var(--acc)} .btn.gh{background:transparent;border:1px solid var(--line);color:var(--ink2)}
  .btn.full{width:100%;margin-top:10px} .btn.sm{padding:7px 12px;font-size:12px;border-radius:8px}
  .item{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;box-shadow:var(--sh)}
  .item .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .nm{font-weight:700;font-size:15px} .mt{font-size:12.5px;color:var(--mut);margin-top:2px}
  .tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:var(--line2);color:var(--ink2)}
  .tag.pe{background:#fdeede;color:var(--warn)} .tag.np{background:#e7f1e6;color:var(--ok)}
  .empty{text-align:center;color:var(--mut);padding:34px 12px;font-size:14px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;box-shadow:var(--sh)}
  .kpi b{display:block;font-size:22px;font-family:Fraunces,serif;font-weight:600}
  .kpi span{font-size:11px;color:var(--mut)}
  .kpi.dark{background:var(--ink);color:var(--paper);border-color:var(--ink)} .kpi.dark b{color:var(--acc2)} .kpi.dark span{color:#b6a894}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .bar{height:9px;background:var(--line2);border-radius:6px;overflow:hidden;margin-top:6px}
  .bar>i{display:block;height:100%;border-radius:6px;background:var(--acc)}
  .circ{width:19px;height:19px;border-radius:50%;border:2px solid var(--ok);flex:none;cursor:pointer;display:inline-block}
  .circ.on{background:var(--ok)}
  .circ.wa{border-color:#25a35a} .circ.wa.on{background:#25a35a}
  .et{font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid var(--line);cursor:pointer;background:#fff;color:var(--mut)}
  .et.on{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700}
  .hint{font-size:12px;color:var(--mut);margin-top:5px}
  .modal{position:fixed;inset:0;background:rgba(30,20,8,.5);z-index:60;display:flex;align-items:flex-end;justify-content:center}
  .modal .box{background:var(--card);border-radius:16px 16px 0 0;padding:17px;width:100%;max-width:920px;max-height:90vh;overflow:auto}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:22px;z-index:80;font-size:13px}
  small.dim{color:var(--mut)}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--sh)}
  .pimg{aspect-ratio:1/1;background:#efe6d5 center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:34px}
  .pin{padding:8px 10px}
  .pn{font-weight:700;font-size:13px;line-height:1.2;min-height:31px}
  .pp{color:var(--acc);font-weight:800;font-size:14px;margin:2px 0 6px}
  .stp{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .stp button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:18px;font-weight:700;cursor:pointer;color:var(--ink)}
  .stp b{font-size:15px;min-width:20px;text-align:center}
  .cajon{flex:1;min-width:130px;padding:14px;border-radius:12px;border:1px solid var(--line);background:var(--card);cursor:pointer;text-align:center;box-shadow:var(--sh)}
  .cajon.on{background:var(--acc);color:#fff;border-color:var(--acc)}
  .cajon b{display:block;font-size:22px;font-family:Fraunces,serif}
  @media(max-width:640px){.g2,.g3{grid-template-columns:1fr}}
</style>

<header><div class="hd">
  <div class="brand">kruh<b>.</b><small>Club del Pan</small></div>
  <div class="quien">Gestión · por Negocios Cuánticos</div>
</div></header>
<nav><div class="nv" id="nav"></div></nav>
<div class="wrap"><div id="main" class="spin" style="text-align:center;padding:40px;color:var(--mut)">Cargando…</div></div>
<div id="modal-host"></div>

<script>
const SB='https://fnayedgvamxktxfvywwl.supabase.co', K='sb_publishable_NVTYNkJ0V6obLwgwjXza1g_3Ihp-xMv';
const H={apikey:K,Authorization:'Bearer '+K,'Content-Type':'application/json'};
const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const money=n=>'$'+Math.round(+n||0).toLocaleString('es-CO');
const num=n=>Math.round(+n||0).toLocaleString('es-CO');
async function GET(p){ const r=await fetch(SB+'/rest/v1/'+p,{headers:H}); return r.ok?r.json():[]; }
async function POST(t,b){ const r=await fetch(SB+'/rest/v1/'+t,{method:'POST',headers:{...H,Prefer:'return=representation'},body:JSON.stringify(b)}); return r.ok?(await r.json())[0]:null; }
async function PATCH(t,b){ return fetch(SB+'/rest/v1/'+t,{method:'PATCH',headers:{...H,Prefer:'return=minimal'},body:JSON.stringify(b)}); }
async function DEL(t){ return fetch(SB+'/rest/v1/'+t,{method:'DELETE',headers:H}); }
function toast(t){ const d=document.createElement('div'); d.className='toast'; d.textContent=t; document.body.appendChild(d); setTimeout(()=>d.remove(),1900); }
function modal(html){ $('modal-host').innerHTML='<div class="modal" onclick="if(event.target===this)App.cerrar()"><div class="box">'+html+'</div></div>'; }
function cerrar(){ $('modal-host').innerHTML=''; }

const App={
  cerrar,
  TABS:[['dashboard','📊 Dashboard'],['recetas','🥖 Recetas'],['pedidos','📋 Pedidos'],['crm','📇 CRM'],['proveedores','🚚 Proveedores'],['materiaprima','🌾 Materia prima'],['inventario','📦 Inventario'],['presupuestos','🎯 Presupuestos'],['ventas','💰 Ventas'],['usuarios','👤 Usuarios']],
  view:'dashboard',
  MESNOM:['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'],
  PASS:{admin:'kruhadmin2026', gerencia:'kruhgerencia2026'},
  get esAdmin(){ return this.rol==='admin'; },
  async init(){ this.rol=sessionStorage.getItem('kruh_rol')||''; try{ this._usuarios=await GET('kruh_usuarios?select=nombre,rol,clave,activo&limit=200'); }catch(e){ this._usuarios=[]; }
    if(this.rol!=='admin'&&this.rol!=='gerencia'){this.rol='';} if(!this.rol) return this.vLogin(); this.paintHeader(); this.nav(); this.go('dashboard'); },
  vLogin(){ $('nav').innerHTML=''; $('main').className='';
    $('main').innerHTML=`<div style="max-width:340px;margin:44px auto 0"><div class="card" style="text-align:center">
      <div style="font-family:Fraunces,serif;font-size:38px;color:var(--ink)">kruh<b style="color:var(--acc)">.</b></div>
      <div class="sub" style="margin:4px 0 16px">Ingresa tu clave</div>
      <input id="lg_pass" type="password" placeholder="Clave" style="text-align:center" onkeydown="if(event.key==='Enter')App.login()">
      <button class="btn acc full" onclick="App.login()">Entrar</button>
      <div class="hint" id="lg_err" style="color:var(--bad);display:none;margin-top:8px">Clave incorrecta</div></div></div>`;
    setTimeout(()=>{const e=$('lg_pass');if(e)e.focus();},60); },
  login(){ const p=($('lg_pass').value||'').trim(); let rol=''; for(const k in this.PASS){ if(p===this.PASS[k])rol=k; }
    if(!rol){ const u=(this._usuarios||[]).find(x=>x.clave===p&&x.activo!==false); if(u)rol=u.rol; }
    if(!rol){ const e=$('lg_err'); if(e)e.style.display='block'; return; } this.rol=rol; sessionStorage.setItem('kruh_rol',rol); this.init(); },
  logout(){ sessionStorage.removeItem('kruh_rol'); this.rol=''; this.vLogin(); },
  _okBorrar(){ const p=prompt('🔒 Clave para BORRAR:'); if(p===null)return false; if(p===this.PASS.admin||p===this.PASS.gerencia)return true; alert('Clave incorrecta'); return false; },
  paintHeader(){ const q=document.querySelector('.quien'); if(q) q.innerHTML=`${this.rol==='admin'?'Admin':'Gerencia'} · <a onclick="App.logout()" style="cursor:pointer;text-decoration:underline">salir</a>`; },

  /* ===================== DASHBOARD ===================== */
  async vDashboard(){
    this.loading();
    const [meses,leads,ventas,peds,recs]=await Promise.all([GET('kruh_dashboard?order=orden&limit=24'),GET('kruh_leads?select=creado_en&limit=5000'),GET('kruh_ventas?select=monto,creado_en&limit=8000'),GET('kruh_pedidos?select=items,creado_en&limit=3000'),GET('kruh_recetas?select=producto_id,cantidad,costo_unit&limit=5000')]);
    this._dash=meses;
    const now=new Date(), cm=now.getMonth()+1, mesIni=new Date(now.getFullYear(),now.getMonth(),1), mesNom=this.MESNOM[cm]||'';
    const costoProd={}; recs.forEach(r=>{costoProd[r.producto_id]=(costoProd[r.producto_id]||0)+(+r.cantidad||0)*(+r.costo_unit||0);});
    const liveVentas=ventas.filter(v=>new Date(v.creado_en)>=mesIni).reduce((a,v)=>a+(+v.monto||0),0);
    let liveCosto=0; peds.forEach(p=>{ if(new Date(p.creado_en)<mesIni)return; (p.items||[]).forEach(it=>{liveCosto+=(+it.qty||0)*(costoProd[it.producto_id]||0);}); });
    const manual=meses.find(m=>m.mes&&m.mes.toLowerCase()===mesNom.toLowerCase())||{ventas:0,costo:0,meta:40000000};
    const auto=liveVentas>0;
    const ventasM=auto?liveVentas:(+manual.ventas||0), costo=liveCosto>0?liveCosto:(+manual.costo||0);
    const ubruta=ventasM-costo, margen=ventasM>0?ubruta/ventasM*100:0, meta=+manual.meta||40000000;
    const acumMC=meses.reduce((a,m)=>{const es=m.mes&&m.mes.toLowerCase()===mesNom.toLowerCase();return a+((es?ventasM:(+m.ventas||0))-(es?costo:(+m.costo||0)));},0);
    const registrados=leads.length, nuevosMes=leads.filter(l=>new Date(l.creado_en)>=mesIni).length;
    this.set(`<h1>Dashboard</h1><div class="sub">${esc(mesNom)} ${auto?'· <span style="color:var(--ok);font-weight:700">automático con las ventas del mes</span>':'· simulado (al ingresar pedidos se calcula solo)'} · meta ${money(meta)}</div>
      <div class="kpis">
        <div class="kpi dark"><b>${money(ventasM)}</b><span>Ventas del mes</span></div>
        <div class="kpi"><b>${money(costo)}</b><span>Costo</span></div>
        <div class="kpi"><b style="color:var(--ok)">${money(ubruta)}</b><span>Utilidad bruta</span></div>
        <div class="kpi"><b>${margen.toFixed(0)}%</b><span>Margen contribución</span></div>
        <div class="kpi"><b>${registrados}</b><span>Clientes registrados</span></div>
        <div class="kpi"><b style="color:var(--acc)">${nuevosMes}</b><span>Clientes nuevos (mes)</span></div>
      </div>
      <div class="card"><div class="row" style="justify-content:space-between"><b>Meta del mes (NC)</b><span>${money(ventasM)} / ${money(meta)}</span></div>
        <div class="bar" style="height:12px"><i style="width:${Math.min(100,meta>0?ventasM/meta*100:0)}%;background:var(--acc)"></i></div>
        <div class="hint">${meta>ventasM?('Faltan '+money(meta-ventasM)+' para la meta'):'¡Meta cumplida! 🎉'}</div></div>
      <div class="card"><div style="font-family:Fraunces,serif;font-size:16px">Margen de contribución acumulado</div>
        <b style="font-size:24px;color:var(--acc);font-family:Fraunces,serif">${money(acumMC)}</b>
        <div class="hint">Suma de (ventas − costo) de todos los meses. Al cambiar precios de items, este acumulado se mueve.</div></div>
      <h1 style="font-size:18px;margin-top:20px">Mes a mes vs meta</h1>
      ${meses.map(m=>{const es=m.mes&&m.mes.toLowerCase()===mesNom.toLowerCase();const v=es?ventasM:(+m.ventas||0),cc=es?costo:(+m.costo||0),mt=+m.meta||meta,pct=mt>0?Math.min(100,v/mt*100):0;return `<div class="item"><div class="top"><div><div class="nm">${esc(m.mes)} ${es&&auto?'<span class="tag np">en vivo</span>':''}</div>
        <div class="mt">Ventas ${money(v)}${cc?' · costo '+money(cc):''} · meta ${money(mt)}</div></div>
        ${this.esAdmin?`<button class="btn gh sm" onclick="App.dashModal('${esc(m.mes)}')">✎</button>`:''}</div>
        <div class="bar"><i style="width:${pct}%;background:${pct>=100?'var(--ok)':'var(--acc)'}"></i></div></div>`;}).join('')}
      ${this.esAdmin?`<button class="btn acc full" onclick="App.dashModal()">＋ Agregar mes</button>`:''}`);
  },
  dashModal(mes){ const m=(this._dash||[]).find(x=>x.mes===mes)||{};
    modal(`<h3 style="font-family:Fraunces,serif;margin-bottom:8px">${mes?'Editar '+esc(mes):'Nuevo mes'}</h3>
      <label>Mes</label><input id="d_mes" value="${esc(m.mes||'')}" ${mes?'readonly':''} placeholder="Agosto">
      <div class="g3"><div><label>Ventas</label><input id="d_ven" type="number" value="${m.ventas||0}"></div>
      <div><label>Costo</label><input id="d_cos" type="number" value="${m.costo||0}"></div>
      <div><label>Meta</label><input id="d_meta" type="number" value="${m.meta||40000000}"></div></div>
      <button class="btn acc full" onclick="App.dashSave('${mes||''}')">Guardar</button>`); },
  async dashSave(mes){ const nombre=$('d_mes').value.trim(); if(!nombre){alert('Mes');return;}
    const b={mes:nombre,ventas:+$('d_ven').value||0,costo:+$('d_cos').value||0,meta:+$('d_meta').value||40000000,orden:(this.MESNOM.indexOf(nombre)>0?this.MESNOM.indexOf(nombre):99)};
    await fetch(SB+'/rest/v1/kruh_dashboard?on_conflict=mes',{method:'POST',headers:{...H,Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(b)});
    cerrar(); toast('Guardado'); this.vDashboard(); },
  nav(){ $('nav').innerHTML=this.TABS.filter(([v])=>v!=='usuarios'||this.esAdmin).map(([v,t])=>`<button data-v="${v}" onclick="App.go('${v}')">${t}</button>`).join(''); },
  go(v){ this.view=v; document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
    ({dashboard:this.vDashboard,recetas:this.vRecetas,pedidos:this.vPedidos,crm:this.vCrm,proveedores:this.vProveedores,materiaprima:this.vMateriaPrima,inventario:this.vInventario,presupuestos:this.vPresupuestos,ventas:this.vVentas,usuarios:this.vUsuarios}[v]||this.vDashboard).call(this); },
  set(h){ $('main').className=''; $('main').innerHTML=h; },
  loading(){ $('main').className='spin'; $('main').innerHTML='<div style="text-align:center;padding:40px;color:var(--mut)">Cargando…</div>'; },

  /* ===================== RECETAS = HOJA DE COSTOS ===================== */
  async vRecetas(){
    this.loading();
    const [prods,recs,provs,pasos]=await Promise.all([GET('kruh_productos?order=categoria,nombre&limit=1000'),GET('kruh_recetas?order=creado_en&limit=5000'),GET('kruh_proveedores?order=nombre&limit=2000'),GET('kruh_pasos?order=orden,creado_en&limit=5000')]);
    this._prods=prods; this._provs=provs;
    const rBy={}; recs.forEach(r=>{(rBy[r.producto_id]=rBy[r.producto_id]||[]).push(r);});
    const pBy={}; pasos.forEach(s=>{(pBy[s.producto_id]=pBy[s.producto_id]||[]).push(s);});
    const cats=[...new Set(prods.map(p=>p.categoria||'Sin categoría'))];
    this.set(`<h1>Recetas y costos</h1><div class="sub">Producto → peso/presentación → ingredientes con costo → proceso → costo, precio, IVA y margen</div>
      ${this.esAdmin?`<button class="btn acc" onclick="App.prodModal()">＋ Nuevo producto</button>`:'<div class="hint">Modo Gerencia: puedes ver recetas y costos, pero solo Admin los edita.</div>'}
      ${prods.length?cats.map(cat=>`<div style="margin-top:16px"><div class="tag" style="margin-bottom:8px">${esc(cat)}</div>
        <div class="grid">${prods.filter(p=>(p.categoria||'Sin categoría')===cat).map(p=>{
          const rr=rBy[p.id]||[];
          const costo=rr.reduce((a,r)=>a+(+r.cantidad||0)*(+r.costo_unit||0),0);
          const precio=+p.precio||0, iva=precio*(+p.iva_pct||0)/100, publico=precio+iva;
          const margen=precio-costo, mpct=precio>0?margen/precio*100:0, abierto=this._recOpen===p.id;
          return `<div class="card">
            <div class="top" style="display:flex;justify-content:space-between"><div><div class="nm">${esc(p.nombre)}</div>
              <div class="mt">${p.peso?num(p.peso)+' '+esc(p.unidad||'g')+' · ':''}${esc(p.presentacion||'')} <span class="tag ${p.perecedero?'pe':'np'}">${p.perecedero?'Perecedero':'No perecedero'}</span></div></div>
              ${this.esAdmin?`<button class="btn gh sm" onclick="App.prodModal('${p.id}')">✎</button>`:''}</div>
            <div style="margin-top:10px;border-top:1px dashed var(--line);padding-top:9px">
              <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-bottom:4px">Ingredientes</div>
              ${rr.length?rr.map(r=>`<div class="row" style="justify-content:space-between;font-size:12.5px;padding:2px 0"><span>• ${esc(r.ingrediente)} <small class="dim">${num(r.cantidad)} ${esc(r.unidad||'')}</small></span><span>${money((+r.cantidad||0)*(+r.costo_unit||0))} ${this.esAdmin?`<a onclick="App.recDel('${r.id}')" style="color:var(--bad);cursor:pointer;margin-left:5px">✕</a>`:''}</span></div>`).join(''):'<div class="hint">Sin ingredientes.</div>'}
              ${this.esAdmin?`<button class="btn gh sm full" onclick="App.recModal('${p.id}')">＋ Adicionar ingrediente</button>`:''}</div>
            <div style="margin-top:9px;border-top:1px dashed var(--line);padding-top:9px">
              <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-bottom:4px">Pasos de elaboración</div>

            ${this.esAdmin?`<label class="pimg" style="cursor:pointer;${p.foto_url?`background-image:url('${esc(p.foto_url)}')`:'flex-direction:column;color:var(--acc);font-size:22px'}">${p.foto_url?'':'📷<span style="font-size:10px;font-weight:700;margin-top:2px">Agregar foto</span>'}<input type="file" accept="image/*" style="display:none" onchange="App.subirFoto(this,'${p.id}')"></label>`:`<div class="pimg" style="${p.foto_url?`background-image:url('${esc(p.foto_url)}')`:''}">${p.foto_url?'':'🥖'}</div>`}

              <div class="stp"><button onclick="App.cartSet('${p.id}',-1)">−</button><b>${q}</b><button onclick="App.cartSet('${p.id}',1)">＋</button></div></div>

        </div></div>

          <div style="font-family:Fraunces,serif;font-size:17px;margin-bottom:8px">La cuenta</div>

            <div class="row" style="justify-content:space-between;border-top:1px solid var(--line);margin-top:5px;padding-top:5px"><span>Total</span><b style="font-size:18px;color:var(--acc)">${money(total)}</b></div>
          </div>
          <button class="btn acc full" onclick="App.pedGuardar()" ${nItems?'':'disabled style="opacity:.5"'}>Guardar pedido</button>
          <button class="btn gh full" style="margin-top:6px" onclick="App._cart={};App._pedPaint()">Vaciar</button>
        </div>
      </div>
      <h1 style="font-size:18px;margin-top:22px">Pedidos guardados</h1>
      ${(this._peds||[]).length?this._peds.map(p=>{const it=(p.items||[]);const tel=(p.telefono||'').replace(/\D/g,'');return `<div class="item"><div class="top"><div>

        <div class="mt">${it.map(i=>esc(i.nombre)+' ×'+i.qty).join(' · ')||''} · 📅 ${(p.creado_en||'').slice(0,10)}</div></div>

  cartSet(id,delta){ this._cart=this._cart||{}; if($('pd_cli'))this._cartCli=$('pd_cli').value; if($('pd_tel'))this._cartTel=$('pd_tel').value;
    const q=(this._cart[id]||0)+delta; if(q<=0)delete this._cart[id]; else this._cart[id]=q; this._pedPaint(); },
  async pedGuardar(){ const cart=this._cart||{}, prods=this._prods||[], items=[]; let total=0;
    for(const id in cart){ const q=cart[id], p=prods.find(x=>x.id===id); if(!p)continue; items.push({producto_id:id,nombre:p.nombre,qty:q,precio:+p.precio||0}); total+=(+p.precio||0)*q*(1+(+p.iva_pct||0)/100); }
    if(!items.length)return; const cli=(this._cartCli||'').trim(), tel=(this._cartTel||'').trim();

    if(cli)await POST('kruh_ventas',{cliente:cli,telefono:tel,producto:items.map(i=>i.nombre).join(', '),monto:total});

  /* ===================== INVENTARIO + índice de cobertura ===================== */
  async vInventario(){
    this.loading();

    const tab=this._invTab||'exist'; this._invTab=tab;
    const cobRows=prods.map(p=>{ const cons=(salBy[p.id]||0)/30; const dias=cons>0?(+p.existencias||0)/cons:null; return {p,cons,dias}; });
    const bajos=cobRows.filter(r=>r.dias!==null && r.dias<3);
    this.set(`<h1>Inventario</h1><div class="sub">Sube producción; los pedidos descuentan solo. El índice de cobertura te dice para cuántos días alcanza.</div>
      <div class="kpis"><div class="kpi"><b>${prods.length}</b><span>Productos</span></div>
        <div class="kpi ${bajos.length?'':''}"><b style="color:${bajos.length?'var(--bad)':'var(--ok)'}">${bajos.length}</b><span>Cobertura &lt; 3 días</span></div>
        <div class="kpi dark"><b>${money(prods.reduce((a,p)=>a+(+p.existencias||0)*(+p.precio||0),0))}</b><span>Valor en existencias</span></div></div>
      <div class="row" style="gap:6px;margin-bottom:10px"><button class="et ${tab==='exist'?'on':''}" onclick="App._invTab='exist';App.vInventario()">Existencias + cobertura</button>
        <button class="et ${tab==='mov'?'on':''}" onclick="App._invTab='mov';App.vInventario()">Movimientos</button></div>
      ${tab==='exist'?
        (prods.length?cobRows.map(({p,cons,dias})=>{ const pct=dias===null?0:Math.min(100,dias/7*100); const col=dias===null?'var(--mut)':(dias<3?'var(--bad)':(dias<7?'var(--warn)':'var(--ok)'));
          return `<div class="item"><div class="top"><div><div class="nm">${esc(p.nombre)}</div>
            <div class="mt">Existencias: <b>${num(p.existencias)}</b> ${esc(p.unidad||'')} · consumo ~${cons.toFixed(1)}/día</div></div>
            <div style="text-align:right"><div class="nm" style="color:${col}">${dias===null?'sin ventas':dias.toFixed(1)+' días'}</div><span class="hint">cobertura</span></div></div>
            <div class="bar"><i style="width:${pct}%;background:${col}"></i></div>
            <div class="row" style="margin-top:9px"><button class="btn acc sm" onclick="App.movModal('${p.id}','entrada')">＋ Producción</button>
              <button class="btn gh sm" onclick="App.movModal('${p.id}','salida')">− Salida/merma</button></div></div>`;}).join(''):'<div class="empty">Sin productos.</div>')
        : (movs.length?movs.slice(0,200).map(m=>{const p=prods.find(x=>x.id===m.producto_id);return `<div class="item"><div class="top"><div><div class="nm">${m.tipo==='entrada'?'⬆️':'⬇️'} ${esc(p?p.nombre:'—')}</div><div class="mt">${esc(m.motivo||'')} · ${(m.creado_en||'').slice(0,16).replace('T',' ')}</div></div><div class="nm" style="color:${m.tipo==='entrada'?'var(--ok)':'var(--bad)'}">${m.tipo==='entrada'?'+':'−'}${num(m.cantidad)}</div></div></div>`;}).join(''):'<div class="empty">Sin movimientos.</div>')}`);

  /* ===================== PRESUPUESTOS (meta en cantidad, 4 semanas) ===================== */
  async vPresupuestos(){
    this.loading();
    const [pres,peds,prods]=await Promise.all([GET('kruh_presupuestos?order=creado_en&limit=500'),GET('kruh_pedidos?limit=3000'),GET('kruh_productos?order=nombre&limit=1000')]);
    this._pres=pres; this._prods=prods;
    const now=new Date(), mesIni=new Date(now.getFullYear(),now.getMonth(),1);
    const vc={}, vm={};
    peds.forEach(p=>{ const d=new Date(p.creado_en); if(d<mesIni)return; const s=Math.min(3,Math.floor((d.getDate()-1)/7)); (p.items||[]).forEach(it=>{ const k=it.producto_id; (vc[k]=vc[k]||[0,0,0,0])[s]+=(+it.qty||0); (vm[k]=vm[k]||[0,0,0,0])[s]+=(+it.qty||0)*(+it.precio||0); }); });
    this.set(`<h1>Presupuestos</h1><div class="sub">Meta en cantidad por producto · el precio y el total salen de la base · dividida en 4 semanas · avance en cantidad y dinero</div>
      <button class="btn acc" onclick="App.presModal()">＋ Nueva meta</button>
      <div style="margin-top:14px">${pres.length?pres.map(pr=>{
        const prod=prods.find(x=>x.id===pr.producto_id)||{}, precio=+prod.precio||0;
        const metaCant=+pr.meta_cant||0, metaPesos=metaCant*precio, semCant=metaCant/4;
        const arrC=vc[pr.producto_id]||[0,0,0,0], arrM=vm[pr.producto_id]||[0,0,0,0];
        const vendCant=arrC.reduce((a,b)=>a+b,0), vendPesos=arrM.reduce((a,b)=>a+b,0);
        const pct=metaCant>0?Math.min(100,vendCant/metaCant*100):0, faltaC=Math.max(0,metaCant-vendCant), faltaP=Math.max(0,metaPesos-vendPesos);
        return `<div class="item"><div class="top"><div><div class="nm">${esc(pr.producto||prod.nombre||'—')}</div>
          <div class="mt">Meta ${num(metaCant)} und × ${money(precio)} = <b>${money(metaPesos)}</b>/mes · ${num(semCant)} und/semana</div></div>
          <div class="nm" style="color:${pct>=100?'var(--ok)':(pct>=60?'var(--warn)':'var(--bad)')}">${pct.toFixed(0)}%</div></div>
          <div class="bar"><i style="width:${pct}%;background:${pct>=100?'var(--ok)':'var(--acc)'}"></i></div>
          <div class="row" style="gap:6px;margin-top:8px">${arrC.map((cn,i)=>`<div style="flex:1;text-align:center;font-size:11px"><div class="dim">S${i+1}</div><b style="color:${cn>=semCant&&semCant>0?'var(--ok)':'var(--ink2)'}">${num(cn)}</b><div class="dim">${money(arrM[i])}</div></div>`).join('')}</div>
          <div class="hint" style="margin-top:6px">Lleva <b>${num(vendCant)} und</b> · ${money(vendPesos)} · faltan <b>${num(faltaC)} und</b> (${money(faltaP)}) <a onclick="App.presDel('${pr.id}')" style="color:var(--bad);cursor:pointer;float:right">eliminar</a></div></div>`;}).join(''):'<div class="empty">Escoge un producto y ponle su meta en cantidad; el precio y el total salen de la base.</div>'}</div>`);
  },
  presModal(){ const prods=this._prods||[];
    modal(`<h3 style="font-family:Fraunces,serif;margin-bottom:8px">Nueva meta por producto</h3>
      <label>Producto (del catálogo)</label>
      <select id="pr_prod" onchange="App.presCalc()">${prods.map(p=>`<option value="${p.id}" data-n="${esc(p.nombre)}" data-pre="${p.precio||0}">${esc(p.nombre)} · ${money(p.precio)}</option>`).join('')}</select>

      <button class="btn acc full" onclick="App.presSave()">Guardar meta</button>`); this.presCalc(); },
  presCalc(){ const s=$('pr_prod'); if(!s)return; const o=s.options[s.selectedIndex], pre=+(o?o.dataset.pre:0)||0, cant=+($('pr_cant').value)||0;

  /* ===================== VENTAS (clientes, estilo Smart) ===================== */
  async vVentas(){
    this.loading();
    const [ventas,seg]=await Promise.all([GET('kruh_ventas?order=creado_en.desc&limit=8000'),GET('kruh_seguimiento?limit=3000')]);
    const segSet={}; seg.forEach(s=>segSet[s.cliente]=s.contactado);
    const mesIni=new Date(); mesIni.setDate(1); mesIni.setHours(0,0,0,0);
    const by={};
    ventas.forEach(v=>{ const k=(v.cliente||'—').trim(); const o=by[k]=by[k]||{cliente:k,tel:v.telefono||'',compras:0,mesMonto:0,total:0,estemes:false,primera:v.creado_en,ultima:v.creado_en};
      o.compras++; o.total+=(+v.monto||0); if(v.creado_en<o.primera)o.primera=v.creado_en; if(v.creado_en>o.ultima)o.ultima=v.creado_en;

        <div class="row" style="gap:8px">${tel?`<a href="https://wa.me/57${tel}" target="_blank" class="btn sm" style="background:#25a35a;color:#fff">📱</a>`:''}
          <span class="circ wa ${on?'on':''}" title="seguimiento WhatsApp" onclick="App.segToggle('${esc(o.cliente).replace(/'/g,"")}',${on?1:0})"></span></div></div></div>`;}).join(''):'<div class="empty">Sin ventas. Se llenan solas con los Pedidos, o registra una aquí.</div>'}</div>`);

    modal(`<h3 style="font-family:Fraunces,serif;margin-bottom:8px">${id?'Editar':'Nuevo'} usuario</h3>
      <div class="g2"><div><label>Nombre</label><input id="u_nom" value="${esc(u.nombre||'')}"></div>
      <div><label>Rol</label><select id="u_rol"><option value="gerencia" ${u.rol==='gerencia'?'selected':''}>Gerencia</option><option value="admin" ${u.rol==='admin'?'selected':''}>Admin</option></select></div></div>
      <label>Clave de acceso</label><input id="u_clave" value="${esc(u.clave||'')}">
      <label>Atribuciones (qué puede hacer)</label><textarea id="u_atr" placeholder="Ej: maneja pedidos e inventario, no borra">${esc(u.atribuciones||'')}</textarea>
      <label>¿Activo?</label><select id="u_act"><option value="true" ${u.activo!==false?'selected':''}>Sí</option><option value="false" ${u.activo===false?'selected':''}>No</option></select>
      <button class="btn acc full" onclick="App.usSave('${id||''}')">Guardar</button>
      ${id?`<button class="btn gh full" style="color:var(--bad)" onclick="App.usDel('${id}')">Eliminar</button>`:''}`); },
  async usSave(id){ const b={nombre:$('u_nom').value.trim(),rol:$('u_rol').value,clave:$('u_clave').value.trim(),atribuciones:$('u_atr').value.trim(),activo:$('u_act').value==='true'};
    if(!b.nombre||!b.clave){alert('Nombre y clave son obligatorios');return;} if(id)await PATCH('kruh_usuarios?id=eq.'+id,b); else await POST('kruh_usuarios',b); cerrar(); toast('Usuario guardado'); this.vUsuarios(); },
  async usDel(id){ if(!this._okBorrar())return; await DEL('kruh_usuarios?id=eq.'+id); cerrar(); this.vUsuarios(); },
};
window.addEventListener('DOMContentLoaded',()=>App.init());
</script>
