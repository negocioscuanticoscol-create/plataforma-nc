<!doctype html><html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Barrido Presencial · Mapa y lista</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif}
body{background:#0f1620;color:#eaf1f8;max-width:560px;margin:0 auto;padding-bottom:30px}
header{background:#0b1220;border-bottom:3px solid #E8620C;padding:12px 16px}
header b{font-size:17px}header b span{color:#E8620C}
.kpis{display:flex;gap:8px;padding:10px 14px}
.k{flex:1;background:#18222e;border:1px solid #263647;border-radius:10px;padding:10px;text-align:center}
.k b{font-size:22px;display:block;color:#E8620C}.k span{font-size:11px;color:#8ea3b5}
#map{height:280px;margin:0 14px;border-radius:12px;border:1px solid #263647}
main{padding:12px 14px}
.item{background:#18222e;border:1px solid #263647;border-radius:12px;padding:10px;margin-bottom:10px;display:flex;gap:10px}
.item img{width:70px;height:70px;border-radius:9px;object-fit:cover;flex:none;background:#0b1220}
.item .nom{font-weight:700;font-size:15px}
.item .meta{font-size:12px;color:#8ea3b5;margin-top:2px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:800}
.b-si{background:#16a34a33;color:#4ade80}.b-no{background:#ef444433;color:#fca5a5}.b-x{background:#33475b;color:#9fb3c0}
.acc{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.acc a,.acc button{font-size:11.5px;padding:6px 10px;border-radius:8px;border:none;cursor:pointer;text-decoration:none;font-weight:700}
.b1{background:#22303f;color:#cfe0ff}.b2{background:#16a34a;color:#fff}.b3{background:#25D366;color:#fff}
.empty{text-align:center;color:#8ea3b5;padding:40px}
</style></head><body>
<header><b>🗺️ BARRIDO <span>PRESENCIAL</span> · mapa y lista</b></header>
<div class="kpis" id="kpis"></div>
<div id="map"></div>
<main id="lista"><div class="empty">Cargando…</div></main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SB='https://fnayedgvamxktxfvywwl.supabase.co', K='sb_publishable_NVTYNkJ0V6obLwgwjXza1g_3Ihp-xMv';
const H={apikey:K,Authorization:'Bearer '+K};
function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;');}
let map, capa;
async function cargar(){
  let d=[]; try{ d=await (await fetch(SB+'/rest/v1/nc_barrido_presencial?empresa=eq.feroz&order=creado_en.desc&limit=1000',{headers:H})).json(); }catch(e){}
  d=Array.isArray(d)?d:[];
  const hoy=new Date().toDateString();
  const nInt=d.filter(x=>x.interesado==='si').length;
  const nHoy=d.filter(x=>new Date(x.creado_en).toDateString()===hoy).length;
  document.getElementById('kpis').innerHTML=`<div class="k"><b>${d.length}</b><span>Negocios</span></div><div class="k"><b>${nInt}</b><span>🔥 Interesados</span></div><div class="k"><b>${nHoy}</b><span>Hoy</span></div>`;
  // mapa
  if(!map){ map=L.map('map').setView([4.6,-74.08],5); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'OSM'}).addTo(map); capa=L.layerGroup().addTo(map); }
  capa.clearLayers(); const pts=[];
  d.forEach(x=>{ if(x.lat&&x.lng){ const col=x.interesado==='si'?'#16a34a':x.interesado==='no'?'#ef4444':'#8ea3b5';
    const m=L.circleMarker([x.lat,x.lng],{radius:8,color:col,fillColor:col,fillOpacity:.85,weight:2}).bindPopup('<b>'+esc(x.nombre||'Negocio')+'</b><br>'+esc(x.ciudad||'')+(x.telefono?'<br>📞 '+esc(x.telefono):''));
    capa.addLayer(m); pts.push([x.lat,x.lng]); } });
  if(pts.length) map.fitBounds(pts,{padding:[30,30],maxZoom:14});
  // lista
  const cont=document.getElementById('lista');
  if(!d.length){ cont.innerHTML='<div class="empty">Aún no hay negocios capturados. Usa la app de campo.</div>'; return; }
  cont.innerHTML=d.map(x=>{
    const bcl=x.interesado==='si'?'b-si':x.interesado==='no'?'b-no':'b-x'; const btx=x.interesado==='si'?'🔥 Interesado':x.interesado==='no'?'❌ No':'— sin marcar';
    const fotos=[x.foto_negocio,x.foto_ref1,x.foto_ref2,x.foto_tarjeta].filter(Boolean);
    const tel=(x.telefono||'').replace(/\\D/g,'');
    return `<div class="item">
      <img src="${x.foto_negocio||''}" onerror="this.style.opacity=.2">
      <div style="flex:1;min-width:0">
        <div class="nom">${esc(x.nombre||'Negocio sin nombre')} <span class="badge ${bcl}">${btx}</span></div>
        <div class="meta">${esc(x.ciudad||'')}${x.vende?' · '+esc(x.vende):''}${x.telefono?' · 📞 '+esc(x.telefono):''}</div>
        ${x.compra_a?`<div class="meta">compra a: ${esc(x.compra_a)}</div>`:''}
        <div class="acc">
          ${x.lat?`<a class="b1" href="https://www.google.com/maps?q=${x.lat},${x.lng}" target="_blank">📍 Mapa</a>`:''}
          ${fotos.map((f,i)=>`<a class="b1" href="${f}" target="_blank">📷 ${['Fachada','Prod1','Prod2','Tarjeta'][i]||i+1}</a>`).join('')}
          ${tel?`<a class="b3" href="https://wa.me/57${tel}" target="_blank">📲 WA</a>`:''}
          <button class="b2" onclick="pasar('${x.id}',this)">→ Marcador</button>
        </div>
      </div></div>`;
  }).join('');
}
async function pasar(id,btn){
  const d=await (await fetch(SB+'/rest/v1/nc_barrido_presencial?id=eq.'+id,{headers:H})).json();
  const x=d&&d[0]; if(!x){alert('No encontré el registro');return;}
  const cel=(x.telefono||'').replace(/\\D/g,'');
  if(!cel){alert('Este negocio no tiene teléfono — agrégalo primero para pasarlo al marcador.');return;}
  // dedup por telefono
  const ya=await (await fetch(SB+'/rest/v1/feroz_marcador_leads?cel=eq.'+encodeURIComponent(cel)+'&select=fila&limit=1',{headers:H})).json();
  if(Array.isArray(ya)&&ya.length){ btn.textContent='ya estaba'; btn.disabled=true; return; }
  const mx=await (await fetch(SB+'/rest/v1/feroz_marcador_leads?mundo=eq.distribuidor&select=fila&order=fila.desc&limit=1',{headers:H})).json();
  const nf=(parseInt(((mx&&mx[0]&&mx[0].fila)||'0').replace(/\\D/g,''))||0)+1;
  const rec={empresa:'feroz',mundo:'distribuidor',fila:String(nf),nombre:x.nombre||'Negocio',ciudad:x.ciudad||null,cel,estado:'Pendiente',aplica:'aplica',esp:'DOTACION',lat:x.lat,lng:x.lng,nota:'Barrido presencial'+(x.compra_a?' · compra a '+x.compra_a:''),fuente:'presencial'};
  const r=await fetch(SB+'/rest/v1/feroz_marcador_leads',{method:'POST',headers:{...H,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(rec)});
  btn.textContent=r.ok?'✅ pasado':'error'; btn.disabled=true;
}
cargar();
</script></body></html>
