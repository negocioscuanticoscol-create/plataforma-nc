<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZARRAT · Atelier</title>
<style>
  :root{
    --paper:#f5f2ec; --card:#fffdf9; --ink:#17150f; --ink2:#4a463c; --mut:#918a7a;
    --line:#e2dbcd; --line2:#efe9dd; --acc:#8a6a3d; --acc2:#b08c56;
    --ok:#4a7a52; --warn:#b4622e; --bad:#a33b30;
    --sh:0 1px 2px rgba(30,24,10,.04),0 10px 30px -16px rgba(30,24,10,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:900px;margin:0 auto;padding:0 16px 90px}
  /* ---- header ---- */
  header{background:var(--ink);color:var(--paper);padding:16px 0;margin-bottom:0}
  .hd{max-width:900px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{font-family:Georgia,"Times New Roman",serif;font-size:26px;letter-spacing:.34em;font-weight:400;text-indent:.34em}
  .brand small{display:block;font-family:"Segoe UI",sans-serif;font-size:9.5px;letter-spacing:.28em;color:var(--acc2);text-indent:.28em;margin-top:2px}
  .hd .quien{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#a49a86}
  /* ---- nav ---- */
  nav{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;overflow-x:auto}
  .nv{max-width:900px;margin:0 auto;display:flex;gap:2px;padding:0 10px}
  nav button{flex:0 0 auto;background:none;border:none;padding:13px 12px;font-size:12.5px;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;font-family:inherit}
  nav button.on{color:var(--ink);border-bottom-color:var(--acc)}
  /* ---- generales ---- */
  h1{font-family:Georgia,serif;font-size:24px;font-weight:400;letter-spacing:.01em;margin:22px 0 3px}
  .sub{color:var(--mut);font-size:13px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
  label{display:block;font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);margin:9px 0 4px}
  input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font-size:15px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
  textarea{min-height:64px;resize:vertical}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .btn{padding:12px 18px;border:none;border-radius:8px;background:var(--ink);color:var(--paper);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
  .btn.acc{background:var(--acc)}
  .btn.gh{background:transparent;border:1px solid var(--line);color:var(--ink2)}
  .btn.full{width:100%;margin-top:12px}
  .btn.sm{padding:7px 12px;font-size:12px;border-radius:7px}
  /* ---- items ---- */
  .item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:9px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .item .nm{font-weight:700;font-size:15px}
  .item .mt{font-size:12.5px;color:var(--mut);margin-top:2px}
  .item.done{opacity:.5}
  .item.done .nm{text-decoration:line-through}
  .tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:var(--line2);color:var(--ink2)}
  .tag.a{background:#f0e6d6;color:var(--acc)}
  .empty{text-align:center;color:var(--mut);padding:34px 12px;font-size:14px}
  /* ---- KPIs ---- */
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--sh)}
  .kpi b{display:block;font-size:22px;font-family:Georgia,serif;font-weight:400;letter-spacing:-.01em}
  .kpi span{font-size:11px;color:var(--mut);letter-spacing:.05em}
  .kpi.eq{grid-column:1/-1;background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .kpi.eq b{color:var(--acc2);font-size:28px}
  .kpi.eq span{color:#a49a86}
  /* ---- catalogo ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .pz{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--sh)}
  .pz .img{aspect-ratio:3/4;background:#efeae0 center/cover no-repeat;position:relative}
  .pz .img::after{content:"ZARRAT";position:absolute;bottom:6px;right:8px;font-family:Georgia,serif;font-size:9px;letter-spacing:.22em;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6)}
  .pz .in{padding:9px 11px}
  .pz .n{font-weight:700;font-size:13.5px;line-height:1.25}
  .pz .v{color:var(--acc);font-weight:800;font-size:14px;margin-top:2px}
  .pz .f{font-size:10.5px;color:var(--mut);margin-top:1px}
  /* ---- medidas ---- */
  .med{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:9px}
  .med .m label{margin-top:0}
  .med input{text-align:center;font-weight:700}
  /* ---- crm ---- */
  .etapas{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
  .et{font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid var(--line);cursor:pointer;background:#fff;color:var(--mut)}
  .et.on{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700}
  .hint{font-size:12px;color:var(--mut);margin-top:5px}
  @media(max-width:640px){.g2,.g3{grid-template-columns:1fr}.kpis{grid-template-columns:1fr}}
</style>

<header><div class="hd">
  <div class="brand">ZARRAT<small>MAESTROS DEL ESTILO EN UN SOLO SITIO</small></div>
  <div class="quien">Sistema de gestión</div>
</div></header>

<nav><div class="nv" id="nav"></div></nav>

<div class="wrap"><div id="main"></div></div>

<script>
const SB='https://fnayedgvamxktxfvywwl.supabase.co', K='sb_publishable_NVTYNkJ0V6obLwgwjXza1g_3Ihp-xMv';
const H={apikey:K,Authorization:'Bearer '+K,'Content-Type':'application/json'};
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const $$=n=>'$'+Math.round(+n||0).toLocaleString('es-CO');
const hoy=()=>new Date().toISOString().slice(0,10);
const mesAct=()=>new Date().toISOString().slice(0,7);
async function api(p,o={}){const r=await fetch(SB+'/rest/v1/'+p,{headers:H,...o});const t=await r.text();return t?JSON.parse(t):[];}
const get=p=>api(p);
const post=(t,b,pref)=>fetch(SB+'/rest/v1/'+t,{method:'POST',headers:{...H,Prefer:pref||'return=representation'},body:JSON.stringify(b)})
  .then(async r=>{ const x=await r.text(); if(!r.ok){ alert('No se pudo guardar: '+x.slice(0,120)); throw new Error(x); } return x?JSON.parse(x):null; });
const patch=(t,q,b)=>fetch(SB+'/rest/v1/'+t+'?'+q,{method:'PATCH',headers:{...H,Prefer:'return=minimal'},body:JSON.stringify(b)});
const del=(t,q)=>fetch(SB+'/rest/v1/'+t+'?'+q,{method:'DELETE',headers:H});

const TABS=[['pend','🏗️ Estructuración'],['gastos','💰 Gastos'],['clientes','👥 Clientes'],['medidas','📐 Medidas'],
            ['catalogo','🖼️ Catálogo'],['cotiz','📋 Cotizaciones'],['ventas','🛒 Ventas'],['crm','📇 CRM']];
let TAB='pend', CLI=[], PRENDAS=[], CAT=[];
$('nav').innerHTML=TABS.map(([v,n])=>`<button id="t_${v}" onclick="go('${v}')">${n}</button>`).join('');
function go(t){TAB=t;TABS.forEach(([v])=>$('t_'+v).className=(v===t?'on':''));({pend:vPend,gastos:vGastos,clientes:vClientes,medidas:vMedidas,catalogo:vCatalogo,cotiz:vCotiz,ventas:vVentas,crm:vCrm})[t]();}

/* ═══════ 1 · ESTRUCTURACIÓN ═══════ */
const CATS=['Pendientes','Investigación','Directorio proveedores','Herramientas'];
const RESP=['María Zarrate','Claudia Ruiz','José Calderón'];
let FCAT='Pendientes', EDIT=null, ROWS=[];
async function vPend(){
  ROWS=await get('zarrat_pendientes?order=fecha.asc&limit=400');
  const n=c=>ROWS.filter(x=>(x.categoria||'Pendientes')===c).length;
  const dc=ROWS.filter(x=>(x.categoria||'Pendientes')===FCAT);
  const pen=dc.filter(x=>x.estado!=='hecho'), hech=dc.filter(x=>x.estado==='hecho');
  const e=EDIT||{};
  $('main').innerHTML=`<h1>Estructuración</h1><div class="sub">Elige el cajón, llena el formulario y toca cualquier registro para editarlo</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    ${CATS.map(c=>`<button class="btn ${c===FCAT?'acc':'gh'}" style="flex:1;min-width:130px;padding:14px 10px;font-size:13px" onclick="setCat('${c}')">
      ${c}<div style="font-family:Georgia,serif;font-size:19px;margin-top:2px">${n(c)}</div></button>`).join('')}
  </div>
  <div class="card" ${EDIT?'style="border-color:var(--acc);border-width:2px"':''}>
    ${EDIT?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <b style="color:var(--acc);font-size:13px">✎ Editando registro</b>
      <button class="btn sm gh" onclick="EDIT=null;vPend()">Cancelar</button></div>`:''}
    <div class="g2">
      <div><label>Cajón</label><select id="p_c">${CATS.map(c=>`<option ${c===(e.categoria||FCAT)?'selected':''}>${c}</option>`).join('')}</select></div>
      <div><label>Responsable</label><select id="p_r"><option value="">— sin asignar —</option>${RESP.map(r=>`<option ${r===e.responsable?'selected':''}>${r}</option>`).join('')}</select></div>
    </div>
    <label>Tarea / tipo</label><input id="p_ti" placeholder="Ej: entregar vestido · proveedor de telas · investigar bordadoras" value="${esc(e.titulo||'')}">
    <div class="g2"><div><label>Empresa</label><input id="p_em" placeholder="Razón social / marca" value="${esc(e.empresa||'')}"></div>
      <div><label>Contacto</label><input id="p_co" placeholder="Nombre de la persona" value="${esc(e.contacto||'')}"></div></div>
    <div class="g2"><div><label>Teléfono</label><input id="p_t" inputmode="tel" value="${esc(e.telefono||'')}"></div>
      <div><label>Correo</label><input id="p_ma" inputmode="email" placeholder="correo@…" value="${esc(e.correo||'')}"></div></div>
    <div class="g2"><div><label>Instagram</label><input id="p_ig" placeholder="@usuario" value="${esc(e.instagram||'')}"></div>
      <div><label>Fecha</label><input type="date" id="p_f" value="${esc(e.fecha||hoy())}"></div></div>
    <label>Dirección</label><input id="p_d" placeholder="Dónde" value="${esc(e.direccion||'')}">
    <label>Página web / enlace</label><input id="p_w" placeholder="https://…" value="${esc(e.web||'')}">
    <label>Notas</label><textarea id="p_n" placeholder="Detalle…">${esc(e.notas||'')}</textarea>
    <button class="btn full ${EDIT?'acc':''}" onclick="addPend()">${EDIT?'💾 Guardar cambios':'+ Agregar'}</button>
  </div>
  <h1 style="font-size:18px">${esc(FCAT)} · ${pen.length}</h1>
  ${pen.length?pen.map(it).join(''):'<div class="empty">Nada en este cajón ✦</div>'}
  ${hech.length?`<h1 style="font-size:18px;margin-top:22px">Cerrados · ${hech.length}</h1>${hech.slice(0,25).map(it).join('')}`:''}`;
  if(EDIT) window.scrollTo({top:0,behavior:'smooth'});
  function it(x){const done=x.estado==='hecho';
    return `<div class="item ${done?'done':''}" style="cursor:pointer" onclick="editar(${x.id})" title="Toca para editar"><div>
      <div class="nm">${esc(x.titulo)}${x.empresa?` <span style="font-weight:400;color:var(--mut)">· ${esc(x.empresa)}</span>`:''}</div>
      <div class="mt">${x.responsable?`<span class="tag a">👤 ${esc(x.responsable)}</span> `:''}📅 ${esc(x.fecha||'')}${x.contacto?' · 🙋 '+esc(x.contacto):''}${x.telefono?' · 📱 '+esc(x.telefono):''}</div>
      ${(x.correo||x.instagram||x.direccion)?`<div class="mt">${x.correo?'✉️ '+esc(x.correo):''}${x.instagram?(x.correo?' · ':'')+'📷 '+esc(x.instagram):''}${x.direccion?((x.correo||x.instagram)?' · ':'')+'📍 '+esc(x.direccion):''}</div>`:''}
      ${x.web?`<div class="mt">🔗 <a href="${esc(x.web)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--acc);font-weight:700">${esc(String(x.web).replace(/^https?:\/\//,'').slice(0,44))}</a></div>`:''}
      ${x.notas?`<div class="mt">📝 ${esc(x.notas)}</div>`:''}</div>
      <div style="display:flex;gap:5px;flex-direction:column" onclick="event.stopPropagation()">
        <button class="btn sm ${done?'gh':'acc'}" onclick="togPend(${x.id},'${done?'pendiente':'hecho'}')">${done?'↩︎':'✓'}</button>
        <button class="btn sm gh" onclick="delRow('zarrat_pendientes',${x.id},vPend)">✕</button></div></div>`;}
}
function setCat(c){ FCAT=c; EDIT=null; vPend(); }
function editar(id){ EDIT=ROWS.find(x=>x.id===id)||null; vPend(); }
async function addPend(){
  const t=$('p_ti').value.trim(); if(!t)return alert('Escribe qué es o qué se necesita.');
  const b={fecha:$('p_f').value||hoy(),titulo:t,categoria:$('p_c').value,responsable:$('p_r').value||null,
    empresa:$('p_em').value.trim()||null, contacto:$('p_co').value.trim()||null,
    instagram:$('p_ig').value.trim()||null, correo:$('p_ma').value.trim()||null,
    telefono:$('p_t').value.trim(),direccion:$('p_d').value.trim(),web:$('p_w').value.trim()||null,notas:$('p_n').value.trim()};
  if(EDIT){ await patch('zarrat_pendientes','id=eq.'+EDIT.id,b); EDIT=null; }
  else await post('zarrat_pendientes',b,'return=minimal');
  FCAT=b.categoria; vPend();
}
const togPend=(id,e)=>patch('zarrat_pendientes','id=eq.'+id,{estado:e}).then(vPend);
const delRow=(t,id,cb)=>{ if(confirm('¿Eliminar?')) del(t,'id=eq.'+id).then(cb); };

/* ═══════ 2 · GASTOS + PUNTO DE EQUILIBRIO ═══════ */
async function vGastos(){
  const m=mesAct();
  const [g,cf,vt]=await Promise.all([get('zarrat_gastos?mes=eq.'+m+'&order=valor.desc'),get('zarrat_config?clave=eq.margen'),get('zarrat_ventas?limit=500')]);
  const metaMargen=+((cf[0]||{}).valor||40);           // la META que ella se pone
  const fijos=g.filter(x=>x.tipo==='fijo').reduce((s,x)=>s+(+x.valor||0),0);
  const varia=g.filter(x=>x.tipo!=='fijo').reduce((s,x)=>s+(+x.valor||0),0);
  // ✦ MARGEN REAL: sale de las ventas que YA hizo (no de un número inventado)
  const vTot=vt.reduce((s,x)=>s+(+x.total||0),0);
  const vMar=vt.reduce((s,x)=>s+(+x.margen_contrib||0),0);
  const real=vTot>0?(vMar/vTot*100):0;
  const usa=real>0?real:metaMargen;                     // si aún no hay ventas, usa la meta
  const pe=usa>0?fijos/(usa/100):0;                     // punto de equilibrio con el margen REAL
  const dif=real-metaMargen;
  $('main').innerHTML=`<h1>Gastos y rentabilidad</h1><div class="sub">${m} · el % sale de tus ventas reales, no de un estimado</div>
  <div class="kpis">
    <div class="kpi"><b>${$$(fijos)}</b><span>GASTOS FIJOS</span></div>
    <div class="kpi"><b>${$$(varia)}</b><span>VARIABLES</span></div>
    <div class="kpi eq"><b>${$$(pe)}</b><span>PUNTO DE EQUILIBRIO — hay que vender esto al mes para no perder</span></div>
  </div>
  <div class="card" style="border-left:4px solid ${real>0?(dif>=0?'var(--ok)':'var(--warn)'):'var(--line)'}">
    <div style="font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--mut)">TU RENTABILIDAD REAL</div>
    ${vTot>0?`
      <div style="display:flex;align-items:baseline;gap:10px;margin-top:3px">
        <b style="font-family:Georgia,serif;font-size:32px;color:${dif>=0?'var(--ok)':'var(--warn)'}">${real.toFixed(1)}%</b>
        <span style="font-size:13px;color:var(--mut)">de margen de contribución</span></div>
      <div class="hint">Calculado con <b>${vt.length}</b> venta(s): aportaron <b>${$$(vMar)}</b> sobre <b>${$$(vTot)}</b> vendidos.</div>
      <div class="hint" style="color:${dif>=0?'var(--ok)':'var(--warn)'};font-weight:700">
        ${dif>=0?`✦ Vas ${dif.toFixed(1)} puntos POR ENCIMA de tu meta (${metaMargen}%).`:`⚠ Vas ${(-dif).toFixed(1)} puntos POR DEBAJO de tu meta (${metaMargen}%). Sube precios o baja costos.`}</div>
    `:`<div style="font-family:Georgia,serif;font-size:26px;color:var(--mut);margin-top:3px">— sin ventas aún —</div>
      <div class="hint">Cuando registres ventas, aquí sale tu margen REAL (no un estimado). Por ahora uso tu meta del ${metaMargen}%.</div>`}
  </div>
  <div class="card">
    <label>Meta de margen (%) — solo para comparar</label>
    <div style="display:flex;gap:8px"><input id="g_m" type="number" value="${metaMargen}" min="1" max="99" style="flex:1">
      <button class="btn acc" onclick="setMargen()">Guardar meta</button></div>
    <div class="hint">Punto de equilibrio = Gastos fijos ÷ margen real (<b>${usa.toFixed(1)}%</b>) = <b>${$$(pe)}</b> al mes.</div>
  </div>
  <div class="card">
    <div class="g3">
      <div><label>Rubro</label><input id="g_r" placeholder="Ej: Arriendo local"></div>
      <div><label>Valor</label><input id="g_v" inputmode="numeric" placeholder="0"></div>
      <div><label>Tipo</label><select id="g_t"><option value="fijo">Fijo</option><option value="variable">Variable</option></select></div>
    </div>
    <label>Categoría</label>
    <select id="g_c">${['Local','Taller de costura','Servicios (luz/agua)','Teléfono/Internet','Empleados','Materia prima','Transporte','Publicidad','Otros'].map(c=>`<option>${c}</option>`).join('')}</select>
    <button class="btn full" onclick="addGasto()">+ Agregar gasto</button>
  </div>
  <h1 style="font-size:18px">Gastos cargados · ${g.length} <span style="font-size:13px;color:var(--mut)">(total ${$$(tot)})</span></h1>
  ${g.length?g.map(x=>`<div class="item"><div><div class="nm">${esc(x.rubro)}</div>
    <div class="mt"><span class="tag ${x.tipo==='fijo'?'a':''}">${esc(x.tipo)}</span> ${esc(x.categoria||'')}</div></div>
    <div style="text-align:right"><div class="nm" style="color:var(--acc)">${$$(x.valor)}</div>
    <button class="btn sm gh" style="margin-top:5px" onclick="delRow('zarrat_gastos',${x.id},vGastos)">✕</button></div></div>`).join('')
    :'<div class="empty">Aún no has cargado gastos de este mes.</div>'}`;
}
async function setMargen(){await post('zarrat_config?on_conflict=clave',{clave:'margen',valor:$('g_m').value},'resolution=merge-duplicates,return=minimal');vGastos();}
async function addGasto(){const r=$('g_r').value.trim(),v=+($('g_v').value||'').replace(/\D/g,'');
  if(!r||!v)return alert('Escribe el rubro y el valor.');
  await post('zarrat_gastos',{mes:mesAct(),rubro:r,valor:v,tipo:$('g_t').value,categoria:$('g_c').value},'return=minimal');vGastos();}

/* ═══════ 3 · CLIENTES (con edición) ═══════ */
let ECLI=null;
async function vClientes(){
  CLI=await get('zarrat_clientes?order=creado_en.desc&limit=500');
  const e=ECLI||{};
  $('main').innerHTML=`<h1>Clientes</h1><div class="sub">${CLI.length} registrados · toca uno para editarlo</div>
  <div class="card" ${ECLI?'style="border-color:var(--acc);border-width:2px"':''}>
    ${ECLI?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <b style="color:var(--acc);font-size:13px">✎ Editando cliente</b>
      <button class="btn sm gh" onclick="ECLI=null;vClientes()">Cancelar</button></div>`:''}
    <div class="g2"><div><label>Nombre *</label><input id="c_n" placeholder="Nombre completo" value="${esc(e.nombre||'')}"></div>
      <div><label>Teléfono</label><input id="c_t" inputmode="tel" value="${esc(e.telefono||'')}"></div></div>
    <div class="g2"><div><label>WhatsApp</label><input id="c_w" inputmode="tel" value="${esc(e.whatsapp||'')}"></div>
      <div><label>Email</label><input id="c_e" inputmode="email" value="${esc(e.email||'')}"></div></div>
    <div class="g2"><div><label>Instagram</label><input id="c_i" placeholder="@usuario" value="${esc(e.instagram||'')}"></div>
      <div><label>Dirección</label><input id="c_d" value="${esc(e.direccion||'')}"></div></div>

// SKU automático: ZR-{3 letras del nombre}-{color 2 letras}-{consecutivo 3 dígitos}
function genSKU(nombre,color,n){
  const cl=s=>String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toUpperCase().replace(/[^A-Z]/g,'');
  const a=(cl(nombre)+'XXX').slice(0,3), b=(cl(color)+'XX').slice(0,2);
  return `ZR-${a}-${b}-${String(n).padStart(3,'0')}`;
}

/* ---- Código de barras Code128 (dibujado a mano, sin librerías externas) ---- */
const C128=["212222","222122","222221","121223","121322","131222","122213","122312","132212","221213","221312","231212","112232","122132","122231","113222","123122","123221","223211","221132","221231","213212","223112","312131","311222","321122","321221","312212","322112","322211","212123","212321","232121","111323","131123","131321","112313","132113","132311","211313","231113","231311","112133","112331","132131","113123","113321","133121","313121","211331","231131","213113","213311","213131","311123","311321","331121","312113","312311","332111","314111","221411","431111","111224","111422","121124","121421","141122","141221","112214","112412","122114","122411","142112","142211","241211","221114","413111","241112","134111","111242","121142","121241","114212","124112","124211","411212","421112","421211","212141","214121","412121","111143","111341","131141","114113","114311","411113","411311","113141","114131","311141","411131","211412","211214","211232","2331112"];
function code128B(txt){
  let cs=104, bars=C128[104], w=104;   // start B
  for(let i=0;i<txt.length;i++){ const v=txt.charCodeAt(i)-32; bars+=C128[v]; cs+=v*(i+1); }
  bars+=C128[cs%103]+C128[106];        // checksum + stop
  return bars;
}
function pintaBarras(){
  document.querySelectorAll('svg.bc').forEach(svg=>{
    const pat=code128B(svg.dataset.sku); let x=0, out='';
    for(let i=0;i<pat.length;i++){ const w=+pat[i]; if(i%2===0) out+=`<rect x="${x}" y="0" width="${w}" height="100" fill="#17150f"/>`; x+=w; }
    svg.setAttribute('viewBox',`0 0 ${x} 100`); svg.setAttribute('preserveAspectRatio','none'); svg.innerHTML=out;
  });
}
function etiqueta(id){
  const p=CAT.find(x=>x.id===id); if(!p) return;
  const pat=code128B(p.sku); let x=0,out='';
  for(let i=0;i<pat.length;i++){ const w=+pat[i]; if(i%2===0) out+=`<rect x="${x}" y="0" width="${w}" height="100" fill="#000"/>`; x+=w; }

    <div class="b">ZARRAT</div><div class="t">MAESTROS DEL ESTILO</div>
    <div class="n">${p.nombre}</div><div class="c">${[p.color,p.talla?'T '+p.talla:'',p.tela].filter(Boolean).join(' · ')}</div>

    <svg viewBox="0 0 ${x} 100" preserveAspectRatio="none">${out}</svg>

}

  const s=$('q_p'), o=s.options[s.selectedIndex]; let n,v;
  if(s.value){ n=o.text.split(' · ')[0]; v=+o.dataset.v||0; }
  else { n=$('q_pn').value.trim(); v=+($('q_pv').value||'').replace(/\D/g,'')||0; }
  if(!n)return alert('Elige una pieza del catálogo o descríbela.');
  ITEMS.push({n,v}); s.value=''; $('q_pn').value=''; $('q_pv').value=''; pintaItems(); calcMargen();
}
function pintaItems(){
  const t=ITEMS.reduce((s,i)=>s+i.v,0);
  $('q_items').innerHTML=ITEMS.length?ITEMS.map((i,k)=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line2);font-size:14px">
    <span>${esc(i.n)}</span><span><b>${$$(i.v)}</b> <button class="btn sm gh" onclick="ITEMS.splice(${k},1);pintaItems();calcMargen()">✕</button></span></div>`).join('')
    +`<div style="display:flex;justify-content:space-between;padding:9px 0;font-weight:800"><span>PRECIO DE VENTA</span><span style="color:var(--acc)">${$$(t)}</span></div>`:'';
}
function addCosto(){
  const n=$('q_cn').value.trim(), v=+($('q_cv').value||'').replace(/\D/g,'')||0;
  if(!n||!v)return alert('Escribe el concepto y el valor.');
  COSTOS.push({n,v}); $('q_cn').value=''; $('q_cv').value=''; pintaCostos(); calcMargen();
}
function pintaCostos(){
  $('q_costos').innerHTML=COSTOS.length?COSTOS.map((c,k)=>`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13.5px;border-bottom:1px solid var(--line2)">
    <span>${esc(c.n)}</span><span><b>${$$(c.v)}</b> <button class="btn sm gh" onclick="COSTOS.splice(${k},1);pintaCostos();calcMargen()">✕</button></span></div>`).join(''):'';
}
function calcMargen(){
  const pv=ITEMS.reduce((s,i)=>s+i.v,0);
  const tela=+($('q_tela')?.value||'').toString().replace(/\D/g,'')||0;
  const mo=+($('q_mo')?.value||'').toString().replace(/\D/g,'')||0;
  const ci=COSTOS.reduce((s,c)=>s+c.v,0);
  const costo=tela+mo+ci, mc=pv-costo, pct=pv?Math.round(mc/pv*100):0;
  const r=$('q_res'); if(!r) return;
  r.innerHTML=`<div style="font-size:10.5px;letter-spacing:.08em;color:#a49a86">RESULTADO DE LA PIEZA</div>
    <div style="display:flex;justify-content:space-between;font-size:13.5px;margin-top:6px"><span>Precio de venta</span><b>${$$(pv)}</b></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;color:#c9c0ae"><span>− Tela</span><span>${$$(tela)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;color:#c9c0ae"><span>− Mano de obra</span><span>${$$(mo)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;color:#c9c0ae"><span>− Costos internos</span><span>${$$(ci)}</span></div>
    <div style="border-top:1px solid #3a352a;margin-top:7px;padding-top:7px;display:flex;justify-content:space-between;align-items:baseline">
      <span style="font-size:12px;letter-spacing:.06em">MARGEN DE CONTRIBUCIÓN</span>
      <b style="font-family:Georgia,serif;font-size:24px;color:${mc>0?'var(--acc2)':'#e07a6a'}">${$$(mc)} <span style="font-size:14px">(${pct}%)</span></b></div>
    <div style="font-size:11px;color:#a49a86;margin-top:4px">${mc>0?'✦ Esto es lo que esta pieza APORTA a cubrir tus gastos fijos.':'⚠ Esta pieza no aporta nada: el costo se come el precio.'}</div>`;
}
async function saveCotiz(){
  const ci=$('q_c').value; if(!ci)return alert('Elige el cliente.');
  if(!ITEMS.length)return alert('Agrega al menos una pieza.');
  const c=CLI.find(x=>x.id==ci)||{}; const pv=ITEMS.reduce((s,i)=>s+i.v,0);
  const tela=+($('q_tela').value||'').replace(/\D/g,'')||0, mo=+($('q_mo').value||'').replace(/\D/g,'')||0;
  const cin=COSTOS.reduce((s,x)=>s+x.v,0); const mc=pv-(tela+mo+cin);
  const folio='ZR-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+String(Date.now()).slice(-4);
  await post('zarrat_cotizaciones',{folio,cliente_id:+ci,cliente_nombre:c.nombre,tipo:$('q_t').value,items:ITEMS,
    subtotal:pv,total:pv,costo_tela:tela,costo_mo:mo,costo_interno:cin,costos_detalle:COSTOS,margen_contrib:mc,
    notas:$('q_n').value.trim()},'return=minimal');
  vCotiz();
}
async function aVenta(id){
  const c=(await get('zarrat_cotizaciones?id=eq.'+id))[0]; if(!c)return;
  if(!confirm('¿Pasar a VENTA?\n'+c.cliente_nombre+' · '+$$(c.total)+'\nAporte a gastos fijos: '+$$(c.margen_contrib)))return;
  await post('zarrat_ventas',{folio:c.folio,cliente_id:c.cliente_id,cliente_nombre:c.cliente_nombre,total:c.total,
    margen_contrib:c.margen_contrib||0, costo_total:(+c.costo_tela||0)+(+c.costo_mo||0)+(+c.costo_interno||0)},'return=minimal');
  await patch('zarrat_cotizaciones','id=eq.'+id,{estado:'vendida'});
  go('ventas');
}

/* ═══════ 7 · VENTAS ═══════ */
async function vVentas(){
  const v=await get('zarrat_ventas?order=fecha.desc&limit=200');
  const m=mesAct();
  const mes=v.filter(x=>(x.fecha||'').startsWith(m));
  const tm=mes.reduce((s,x)=>s+(+x.total||0),0), ta=v.reduce((s,x)=>s+(+x.total||0),0);
  const g=await get('zarrat_gastos?mes=eq.'+m);
  const fijos=g.filter(x=>x.tipo==='fijo').reduce((s,x)=>s+(+x.valor||0),0);
  const aportes=mes.reduce((s,x)=>s+(+x.margen_contrib||0),0);   // lo que las piezas aportan a gastos fijos
  const utilidad=aportes-fijos;
  const falta=Math.max(0,fijos-aportes);
  const pct=fijos?Math.min(100,Math.round(aportes/fijos*100)):0;
  $('main').innerHTML=`<h1>Ventas y utilidad</h1><div class="sub">${m} · los márgenes de cada pieza cubriendo los gastos fijos</div>
  <div class="kpis">
    <div class="kpi"><b>${$$(tm)}</b><span>VENDIDO ESTE MES</span></div>
    <div class="kpi"><b style="color:var(--ok)">${$$(aportes)}</b><span>APORTE A GASTOS FIJOS (margen)</span></div>
    <div class="kpi eq"><b style="color:${utilidad>=0?'var(--acc2)':'#e07a6a'}">${utilidad>=0?$$(utilidad):'−'+$$(-utilidad)}</b>
      <span>${utilidad>=0?'✦ UTILIDAD DEL MES (ya cubriste los gastos fijos)':`AÚN EN PÉRDIDA · faltan ${$$(falta)} de aporte para cubrir los ${$$(fijos)} de gastos fijos`}</span></div>
  </div>
  <div class="card" style="padding:12px 15px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:5px">
      <span>APORTES ${$$(aportes)}</span><span>GASTOS FIJOS ${$$(fijos)}</span></div>
    <div style="height:14px;background:var(--line2);border-radius:7px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:${utilidad>=0?'var(--ok)':'var(--acc)'};transition:width .4s"></div></div>
    <div class="hint">${pct}% de tus gastos fijos cubiertos con el margen de las piezas vendidas este mes.</div>
    ${tm>0?`<div style="border-top:1px solid var(--line2);margin-top:9px;padding-top:9px;display:flex;justify-content:space-between;align-items:baseline">
      <span style="font-size:12px;color:var(--mut);letter-spacing:.05em">MARGEN REAL DEL MES</span>
      <b style="font-family:Georgia,serif;font-size:22px;color:var(--ok)">${(aportes/tm*100).toFixed(1)}%</b></div>
      <div class="hint">Sale de las ventas de este mes: aportaron ${$$(aportes)} sobre ${$$(tm)} vendidos.</div>`:''}
  </div>
  ${v.length?v.map(x=>{const mc=+x.margen_contrib||0;
    return `<div class="item"><div><div class="nm">${esc(x.cliente_nombre||'—')}</div>
    <div class="mt">${esc(x.folio||'')} · 📅 ${esc(x.fecha||'')} · <span class="tag ${x.estado_pago==='pagado'?'a':''}">${esc(x.estado_pago)}</span></div>
    <div class="mt">Costo ${$$(x.costo_total)} → <b style="color:var(--ok)">aporta ${$$(mc)}</b></div></div>
    <div style="text-align:right"><div class="nm" style="color:var(--acc)">${$$(x.total)}</div>
    ${x.estado_pago!=='pagado'?`<button class="btn sm acc" style="margin-top:5px" onclick="pagada(${x.id})">✓ Pagada</button>`:''}</div></div>`;}).join('')
    :'<div class="empty">Sin ventas aún.</div>'}`;
}
const pagada=id=>patch('zarrat_ventas','id=eq.'+id,{estado_pago:'pagado'}).then(vVentas);

/* ═══════ 8 · CRM ═══════ */
const ETAPAS=['contacto','interesado','medidas','cotizado','cliente'];
async function vCrm(){
  const [cl,cr]=await Promise.all([get('zarrat_clientes?order=creado_en.desc&limit=500'),get('zarrat_crm?limit=500')]);
  const map={}; cr.forEach(x=>map[x.cliente_id]=x.etapa);
  const cnt=e=>cl.filter(c=>(map[c.id]||'contacto')===e).length;
  $('main').innerHTML=`<h1>CRM</h1><div class="sub">Contacto → Interesado → Medidas → Cotizado → Cliente</div>
  <div class="kpis" style="grid-template-columns:repeat(5,1fr)">
    ${ETAPAS.map(e=>`<div class="kpi" style="padding:10px"><b style="font-size:19px">${cnt(e)}</b><span style="font-size:9.5px">${e.toUpperCase()}</span></div>`).join('')}
  </div>
  ${cl.length?cl.map(c=>{const et=map[c.id]||'contacto';
    return `<div class="item" style="display:block"><div class="nm">${esc(c.nombre)}</div>
      <div class="mt">${c.telefono?'📱 '+esc(c.telefono):''}${c.instagram?' · 📷 '+esc(c.instagram):''}</div>
      <div class="etapas">${ETAPAS.map(e=>`<span class="et ${e===et?'on':''}" onclick="setEtapa(${c.id},'${e}')">${e}</span>`).join('')}</div></div>`;}).join('')
    :'<div class="empty">Registra clientes para verlos aquí.</div>'}`;
}
async function setEtapa(id,e){await post('zarrat_crm?on_conflict=cliente_id',{cliente_id:id,etapa:e},'resolution=merge-duplicates,return=minimal');vCrm();}

go('pend');
</script>
