<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Plataforma Feroz</title>
<style>
  :root{
    --naranja:#E8620C; --naranja2:#ff7a1a; --negro:#15171c; --gris:#f4f5f7;
    --verde:#2e9e4f; --rojo:#d22; --azul:#2f6fed; --linea:#e3e5ea; --texto:#1d1f24; --suave:#6b7280;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--gris);color:var(--texto)}
  input,select,textarea,button{font-family:inherit;font-size:16px}
  .hide{display:none!important}

  /* ===== LOGIN ===== */
  #view-login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#1b1d22,#2a2d34)}
  #view-login .card{background:#fff;border-radius:18px;padding:26px;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,.3)}
  #view-login img{height:54px;display:block;margin:0 auto 6px}
  #view-login .tit{text-align:center;color:var(--suave);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
  #view-login label{font-size:13px;font-weight:600;display:block;margin:12px 0 5px}
  #view-login input{width:100%;padding:13px;border:1.5px solid var(--linea);border-radius:10px}
  #view-login input:focus{outline:none;border-color:var(--naranja)}
  .btn{width:100%;padding:15px;border:none;border-radius:11px;font-weight:700;cursor:pointer;margin-top:14px}
  .btn-main{background:var(--naranja);color:#fff}
  .btn-main:active{background:#cf550a}
  .btn-ghost{background:#fff;color:var(--negro);border:1.5px solid var(--linea)}
  .switch{text-align:center;margin-top:14px;font-size:13px;color:var(--azul);cursor:pointer}
  .msg{margin-top:12px;font-size:13px;padding:10px;border-radius:8px;text-align:center;display:none}
  .msg.err{background:#fde8e8;color:#b3261e;display:block}
  .msg.ok{background:#e7f6ec;color:#1c7a3e;display:block}

  /* ===== APP SHELL ===== */
  #app{min-height:100vh;display:flex;flex-direction:column;max-width:680px;margin:0 auto;background:var(--gris)}
  .topbar{background:#fff;border-bottom:3px solid var(--naranja);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
  .topbar img{height:34px}
  .topbar .who{text-align:right;font-size:12px;line-height:1.3}
  .topbar .who b{display:block;font-size:13px}
  .topbar .rol{display:inline-block;background:var(--negro);color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
  .logout{background:none;border:none;color:var(--suave);font-size:12px;cursor:pointer;margin-left:10px}

  #main{flex:1;padding:14px 14px 120px}
  h1{font-size:19px;margin-bottom:4px}
  .sub{color:var(--suave);font-size:13px;margin-bottom:14px}

  /* nav inferior */
  #nav{position:fixed;bottom:0;left:0;right:0;max-width:680px;margin:0 auto;background:#fff;border-top:1px solid var(--linea);display:flex;flex-direction:column;z-index:20}
  .nav-row{display:flex;width:100%}
  .nav-row2{border-top:1px solid var(--linea);background:#fafbfc}
  #nav button{flex:1;background:none;border:none;padding:9px 2px 10px;font-size:10px;color:var(--suave);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  #nav button .ic{font-size:20px}
  #nav button.active{color:var(--naranja);font-weight:700}

  /* tarjetas / generales */
  .card{background:#fff;border:1px solid var(--linea);border-radius:14px;padding:15px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  label{display:block;font-size:13px;font-weight:600;margin:10px 0 5px}
  .field{width:100%;padding:12px;border:1.5px solid var(--linea);border-radius:10px;background:#fff}
  .field:focus{outline:none;border-color:var(--naranja)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .hint{font-size:12px;color:var(--suave);margin-top:4px}
  .btn-sm{padding:9px 14px;border-radius:9px;border:none;font-weight:700;font-size:13px;cursor:pointer}

  /* dashboard KPIs */
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
  .kpi{background:#fff;border:1px solid var(--linea);border-radius:14px;padding:14px}
  .kpi b{display:block;font-size:26px;color:var(--negro);line-height:1.1}
  .kpi span{font-size:12px;color:var(--suave)}
  .kpi.naranja b{color:var(--naranja)} .kpi.verde b{color:var(--verde)} .kpi.rojo b{color:var(--rojo)}

  /* lista de items */
  .item{background:#fff;border:1px solid var(--linea);border-radius:12px;padding:13px;margin-bottom:10px}
  .item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .item .nom{font-weight:700;font-size:15px}
  .item .meta{font-size:12px;color:var(--suave);margin-top:2px}
  .item .tot{font-weight:800;color:var(--naranja);font-size:15px;white-space:nowrap}
  .badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
  .b-pendiente_pago{background:#fff4e5;color:#8a5300}
  .b-consignado{background:#eef2ff;color:#3a48b3}
  .b-autorizado{background:#e7f0ff;color:#2156c0}
  .b-despachado{background:#e7f6ec;color:#1c7a3e}
  .b-entregado{background:#eef0f2;color:#555}
  .b-anulado{background:#fde8e8;color:#b3261e}
  .b-cotizada{background:#fff4e5;color:#8a5300}
  .b-aceptada{background:#e7f6ec;color:#1c7a3e}
  .acciones-item{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}

  /* curva */
  .grid-tallas{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:8px}
  .grid-tallas .t{background:#fafbfc;border:1px solid var(--linea);border-radius:8px;padding:5px;text-align:center}
  .grid-tallas .t span{display:block;font-size:10px;color:var(--suave);font-weight:700}
  .grid-tallas .t input{width:100%;padding:6px;text-align:center;border:1px solid var(--linea);border-radius:6px;margin-top:3px}
  .estado{position:sticky;bottom:78px;background:var(--negro);color:#fff;border-radius:12px;padding:12px;margin-top:12px}
  .ec-nums{display:flex;gap:10px;margin-bottom:8px}
  .ec-item{flex:1;background:rgba(255,255,255,.08);border-radius:9px;padding:8px;text-align:center}
  .ec-item b{display:block;font-size:24px;color:var(--naranja2);line-height:1}
  .ec-item span{font-size:11px;color:#cbd2da}
  .ec-falta{text-align:center;font-size:13px;font-weight:700;padding:7px;border-radius:8px;background:rgba(255,255,255,.06)}
  .ec-falta.ok{background:rgba(46,158,79,.25);color:#9ff0b8}
  .ec-falta.falta{background:rgba(232,98,12,.22);color:#ffcfa3}

  /* modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:flex-end;justify-content:center}
  .modal .box{background:#fff;border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:680px;max-height:90vh;overflow:auto}
  .modal h3{margin-bottom:4px}
  .empty{text-align:center;color:var(--suave);padding:40px 10px;font-size:14px}
  .spin{text-align:center;padding:30px;color:var(--suave)}
</style>
<script>
/* Tema por empresa: Feroz=naranja · Smart=azul (línea catálogo) · Epheta=verde */
(function(){
  var emp=(new URLSearchParams(location.search).get('empresa')||'feroz').toLowerCase();
  var T={feroz:{a:'#E8620C',b:'#ff7a1a',n:'Feroz'},
         smart:{a:'#2563eb',b:'#3b82f6',n:'Smart Envases'},
         epheta:{a:'#16a085',b:'#1abc9c',n:'Epheta'}}[emp]||{a:'#E8620C',b:'#ff7a1a',n:'Feroz'};
  window.NC_EMPRESA=emp; window.NC_BRAND=T.n;
  var s=document.documentElement.style;
  s.setProperty('--naranja',T.a); s.setProperty('--naranja2',T.b);
  document.addEventListener('DOMContentLoaded',function(){
    document.title='Plataforma '+T.n;
    if(emp!=='feroz'){
      document.querySelectorAll('img[alt="Feroz"]').forEach(function(img){
        var sp=document.createElement('span'); sp.textContent=T.n;
        sp.style.cssText='font-weight:800;font-size:17px;color:'+T.a+';letter-spacing:.5px';
        img.replaceWith(sp);
      });
    }
  });
})();
</script>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="view-login">
  <div class="card">
    <img src="assets/logo.png" alt="Feroz">
    <div class="tit">Plataforma interna</div>
    <div id="login-form">
      <label>Correo</label>
      <input id="lg_email" type="email" inputmode="email" placeholder="tucorreo@correo.com" autocomplete="username">
      <label id="lbl_nombre" class="hide">Tu nombre</label>
      <input id="lg_nombre" class="field hide" placeholder="Nombre y apellido" style="border-radius:10px">
      <label>Contraseña</label>
      <input id="lg_pass" type="password" placeholder="••••••••" autocomplete="current-password">
      <button class="btn btn-main" id="btn_login" onclick="App.login()">Entrar</button>
      <button class="btn btn-ghost hide" id="btn_signup" onclick="App.signup()">Crear cuenta</button>
      <div class="switch" id="sw_signup" onclick="App.modoSignup(true)">¿Primera vez? Crear cuenta</div>
      <div class="switch hide" id="sw_login" onclick="App.modoSignup(false)">Ya tengo cuenta · Entrar</div>
      <div class="msg" id="lg_msg"></div>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hide">
  <div class="topbar">
    <img src="assets/logo.png" alt="Feroz">
    <div style="display:flex;align-items:center">
      <div class="who"><b id="me_nombre">—</b><span class="rol" id="me_rol">—</span></div>
      <button class="logout" onclick="App.logout()">Salir</button>
    </div>
  </div>
  <div id="main"><div class="spin">Cargando…</div></div>
  <div id="nav"></div>
</div>

<div id="modal-host"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Versión fija → el navegador CACHEA los archivos (carga 1 vez y luego instantáneo).
  // Cuando se cambie el código, subir este número (NCVER) y el usuario hace Ctrl+Shift+R una vez.
  var NCVER='20260710m';
  ['config.js','geo-co.js','app.js'].forEach(function(s){
    document.write('<scr'+'ipt src="'+s+'?v='+NCVER+'"><\/scr'+'ipt>');
  });
</script>
</body>
</html>
