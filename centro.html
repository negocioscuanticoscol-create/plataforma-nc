<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NC · Centro de Mando</title>
<style>
:root{--bg:#0d1017;--panel:#151a24;--card:#1b2230;--line:#26303f;--tx:#eaf0f8;--sub:#93a2b5;--faint:#5f6d80;
  --acc:#f2792a;--acc2:#ffb703;--ok:#3fbf7f;--azul:#4a9de8;--rosa:#ec5b8f;--mora:#8b7cf0;
  --ig:#e1306c;--fb:#1877f2;--tk:#00d5c4;--wa:#25d366;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:14.5px;-webkit-font-smoothing:antialiased}
header{background:linear-gradient(135deg,#141a26,#1d2740 60%,#141a26);border-bottom:1px solid var(--line);padding:16px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30}
.logo{font-size:20px;font-weight:800;letter-spacing:.02em}
.logo span{color:var(--acc)}
.tag{font-size:11px;color:var(--faint);letter-spacing:.16em;text-transform:uppercase}
nav{display:flex;gap:6px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:57px;z-index:29;flex-wrap:wrap}
nav button{background:transparent;border:none;color:var(--sub);padding:9px 15px;border-radius:9px;cursor:pointer;font-size:14px;font-weight:600}
nav button.on{background:var(--acc);color:#fff}
.cajones{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.caj{background:var(--card);border:1px solid var(--line);color:var(--sub);padding:9px 16px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px}
.caj.on{background:#0b1f2a;color:#fff;border-color:var(--acc);box-shadow:0 0 0 1px var(--acc) inset}
.caj.add{color:var(--acc)}
main{max-width:1080px;margin:0 auto;padding:20px 16px 80px}
h1{font-size:22px;margin-bottom:2px}
.sub{color:var(--sub);font-size:13px;margin-bottom:18px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px}
.kpi b{font-size:23px;font-weight:800;display:block;line-height:1.1}
.kpi span{font-size:11.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em}
.kpi.acc b{color:var(--acc)} .kpi.ok b{color:var(--ok)} .kpi.azul b{color:var(--azul)}
.cli{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:14px}
.cli .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cli h2{font-size:17px}
.cli .badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:#22303f;color:var(--sub)}
.redes{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
.red{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.red .rh{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;margin-bottom:7px}
.dot{width:10px;height:10px;border-radius:3px;flex:none}
.red input{width:100%;background:#0f141d;border:1px solid var(--line);border-radius:7px;color:var(--tx);padding:6px 8px;font-size:12.5px;margin-bottom:5px}
.red .seg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub)}
.red .seg input{width:90px;margin:0;text-align:right;font-weight:700;color:var(--tx)}
.red a.open{font-size:11.5px;color:var(--azul);text-decoration:none}
.agentes{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.chip{font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;display:inline-flex;align-items:center;gap:6px}
.chip.on{background:#12291f;color:var(--ok);border:1px solid #1f4a37}
.chip.off{background:#2a2331;color:#b58bd6;border:1px solid #3d3350}
.pauta{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:13px}
.pauta div b{color:var(--acc);font-size:16px}
.btn{background:var(--acc);color:#fff;border:none;border-radius:9px;padding:9px 15px;font-weight:700;cursor:pointer;font-size:13.5px}
.btn.ghost{background:#22303f;color:var(--tx)}
.emp{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.empc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-decoration:none;color:var(--tx);display:block}
.empc:hover{border-color:var(--acc)}
.empc .en{font-size:16px;font-weight:800}
.empc .ed{font-size:12.5px;color:var(--sub);margin-top:3px}
.empc .go{color:var(--acc);font-weight:700;font-size:13px;margin-top:10px;display:inline-block}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;padding:10px 18px;border-radius:10px;font-weight:700;z-index:99}
.empty{padding:30px;text-align:center;color:var(--sub)}
.aglist .ag{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 16px;margin-bottom:9px}
.aglist .ag .an{font-weight:700} .aglist .ag .ad{font-size:12.5px;color:var(--sub);margin-top:2px}
.finsec{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 4px;margin-bottom:14px}
.finsec h3{font-size:13px;padding:10px 14px 6px;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}
.finrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--line)}
.finrow .fc b{font-size:14px} .finrow .fn{font-size:11.5px;color:var(--faint);margin-top:2px}
.finbadge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;background:#22303f;color:var(--sub);margin-left:5px}
.finbadge.auto{background:#12291f;color:var(--ok)}
.finm{display:flex;align-items:center;gap:6px;white-space:nowrap}
.finm input{width:120px;background:#0f141d;border:1px solid var(--line);border-radius:7px;color:var(--tx);padding:7px 9px;font-size:13.5px;text-align:right;font-weight:700}
.finm .pfx{color:var(--faint)} .finm b{font-size:14px}
.finx{background:transparent;border:none;color:var(--faint);cursor:pointer;font-size:14px}
.finx:hover{color:var(--rosa)}
.neto{border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:16px;background:linear-gradient(135deg,#141a26,#1b2740)}
.neto .nl{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em}
.neto .nv{font-size:30px;font-weight:800;margin-top:3px}
@media(max-width:560px){nav{top:56px}}
</style>
</head>
<body>
<header>
  <div class="logo">◆ NC <span>Centro de Mando</span></div>
  <div class="tag">Negocios Cuánticos</div>
</header>
<nav id="nav"></nav>
<main id="main"><div class="empty">Cargando…</div></main>
<div id="toast"></div>
<script>
const SB='https://fnayedgvamxktxfvywwl.supabase.co', K='sb_publishable_NVTYNkJ0V6obLwgwjXza1g_3Ihp-xMv';
const H={apikey:K,Authorization:'Bearer '+K,'Content-Type':'application/json'};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const nm=n=>Math.round(+n||0).toLocaleString('es-CO');
async function api(pth,o={}){ try{ const r=await fetch(SB+'/rest/v1/'+pth,{headers:H,...o}); if(o.count){ return +((r.headers.get('content-range')||'0/0').split('/')[1])||0; } const t=await r.text(); if(!r.ok){ console.warn(pth,t.slice(0,120)); return o.method?null:[]; } const d=t?JSON.parse(t):[]; return d; }catch(e){ console.warn(e); return o.method?null:[]; } }
const patch=(pth,b)=>api(pth,{method:'PATCH',body:JSON.stringify(b),headers:{...H,Prefer:'return=minimal'}});
const post=(pth,b)=>api(pth,{method:'POST',body:JSON.stringify(b),headers:{...H,Prefer:'return=minimal'}});
function toast(m){ const t=document.createElement('div'); t.className='toast'; t.textContent=m; $('toast').appendChild(t); setTimeout(()=>t.remove(),2200); }
function mesISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01'; }

const RED={Instagram:{c:'var(--ig)',ic:'📸'},Facebook:{c:'var(--fb)',ic:'📘'},TikTok:{c:'var(--tk)',ic:'🎵'},WhatsApp:{c:'var(--wa)',ic:'💬'}};

const App={
vista:'resumen',
TABS:[['resumen','📊 Resumen'],['marketing','📣 Marketing'],['financiero','💰 Financiero'],['agentes','🤖 Agentes']],
nav(){ $('nav').innerHTML=this.TABS.map(([v,n])=>`<button class="${v===this.vista?'on':''}" onclick="App.go('${v}')">${n}</button>`).join(''); },
go(v){ this.vista=v; this.nav(); $('main').innerHTML='<div class="empty">Cargando…</div>';
  ({resumen:this.vResumen,marketing:this.vMarketing,financiero:this.vFinanciero,agentes:this.vAgentes}[v]).call(this); },

async vFinanciero(){
  const lineas=await api('nc_finanzas?order=orden&limit=500');
  const sc=(await api('nc_smart_comision_mes'))[0]||{comision:0,ventas:0};
  const fc=(await api('nc_feroz_comision_mes'))[0]||{comision:0,pedidos:0};
  this._fin=lineas;
  const money=n=>'$'+nm(n);
  const ing=lineas.filter(l=>l.tipo==='ingreso'&&l.activo!==false);
  const gas=lineas.filter(l=>l.tipo==='gasto'&&l.activo!==false).sort((a,b)=>(a.dia_pago||99)-(b.dia_pago||99));
  const comSmart=+sc.comision||0, comFeroz=+fc.comision||0;
  const totIng=ing.reduce((a,l)=>a+(+l.monto||0),0)+comSmart+comFeroz;
  const cobrado=ing.filter(l=>l.pagado).reduce((a,l)=>a+(+l.monto||0),0)+comSmart+comFeroz;
  const porCobrar=ing.filter(l=>!l.pagado).reduce((a,l)=>a+(+l.monto||0),0);
  const totGas=gas.reduce((a,l)=>a+(+l.monto||0),0);
  const neto=totIng-totGas;
  // fila de INGRESO: monto + ¿entró?
  const rowIng=l=>`<div class="finrow"><div class="fc"><b>${esc(l.concepto)}</b>${l.empresa?`<span class="finbadge">${esc(l.empresa)}</span>`:''}${l.nota?`<div class="fn">${esc(l.nota)}</div>`:''}</div>
    <div class="finm"><span class="pfx">$</span><input type="number" value="${+l.monto||0}" onchange="App.finUpd(${l.id},'monto',this.value)">
      <button class="chip ${l.pagado?'on':'off'}" style="cursor:pointer;border:none" onclick="App.finPagado(${l.id},${!l.pagado})">${l.pagado?'✅ entró':'⏳ pendiente'}</button>
      <button class="finx" onclick="App.finDel(${l.id})">✕</button></div></div>`;
  // fila de GASTO: día de pago + monto
  const rowGas=l=>`<div class="finrow"><div class="fc"><b>${esc(l.concepto)}</b>${l.nota?`<div class="fn">${esc(l.nota)}</div>`:''}</div>
    <div class="finm">📅 <input type="number" min="1" max="31" placeholder="día" style="width:56px" value="${l.dia_pago||''}" onchange="App.finUpd(${l.id},'dia_pago',this.value)">
      <span class="pfx">$</span><input type="number" value="${+l.monto||0}" onchange="App.finUpd(${l.id},'monto',this.value)"><button class="finx" onclick="App.finDel(${l.id})">✕</button></div></div>`;
  const auto=(nom,det,val)=>`<div class="finrow"><div class="fc"><b>${nom}</b><span class="finbadge auto">AUTO</span>${det?`<div class="fn">${det}</div>`:''}</div><div class="finm"><b>${money(val)}</b></div></div>`;
  $('main').innerHTML=`<h1>💰 Financiero · cómo vamos</h1>
    <div class="sub">Comisiones que traen las apps + gastos con su día de pago. Para cuadrar el flujo de caja.</div>
    <div class="neto"><div class="nl">Cómo vamos este mes (ingresos − gastos)</div>
      <div class="nv" style="color:${neto>=0?'var(--ok)':'var(--rosa)'}">${money(neto)}</div>
      <div style="font-size:12.5px;color:var(--sub);margin-top:6px">Ingresos ${money(totIng)} · Gastos ${money(totGas)} · Por cobrar ${money(porCobrar)}</div></div>
    <div class="finsec"><h3>📈 Ingresos / Comisiones — ¿entró la plata?</h3>
      ${auto('Comisión Smart',(sc.ventas||0)+' ventas este mes',comSmart)}
      ${auto('Comisión Feroz',(fc.pedidos||0)+' pedido(s) con comisión',comFeroz)}
      ${ing.map(rowIng).join('')}</div>
    <div class="finsec"><h3>📅 Gastos de NC — ordenados por día de pago</h3>
      ${gas.map(rowGas).join('')||'<div class="finrow"><span style="color:var(--faint);padding:6px 10px">Sin gastos cargados</span></div>'}</div>
    <div style="display:flex;gap:8px"><button class="btn" onclick="App.finAdd('ingreso')">＋ Ingreso</button><button class="btn ghost" onclick="App.finAdd('gasto')">＋ Gasto</button></div>`;
},
async finUpd(id,campo,val){ const b={}; b[campo]=(campo==='dia_pago')?(+val||null):(+val||0); await patch('nc_finanzas?id=eq.'+id,b); const l=(this._fin||[]).find(x=>x.id===id); if(l)l[campo]=b[campo]; toast('Guardado'); if(campo==='dia_pago') this.vFinanciero(); },
async finPagado(id,val){ await patch('nc_finanzas?id=eq.'+id,{pagado:val}); const l=(this._fin||[]).find(x=>x.id===id); if(l)l.pagado=val; this.vFinanciero(); },
async finDel(id){ if(!confirm('¿Eliminar esta línea?'))return; await api('nc_finanzas?id=eq.'+id,{method:'DELETE',headers:{...H,Prefer:'return=minimal'}}); toast('Eliminada'); this.vFinanciero(); },
async finAdd(tipo){ const con=prompt((tipo==='ingreso'?'Ingreso':'Gasto')+' — concepto:'); if(!con)return; const mo=prompt('Monto ($):','0'); const b={tipo,concepto:con.trim(),monto:+mo||0,orden:50}; if(tipo==='gasto'){ const d=prompt('Día de pago del mes (1-31, opcional):',''); if(d)b.dia_pago=+d||null; } await post('nc_finanzas',b); toast('Agregado'); this.vFinanciero(); },

async _leadsMes(){
  const desde=mesISO();
  const smart=await api('nc_bot_leads?empresa=eq.smart&creado_en=gte.'+desde+'&select=telefono',{count:true});
  const feroz=await api('nc_bot_leads_feroz?creado_en=gte.'+desde+'&select=telefono',{count:true});
  return {smart,feroz};
},

async vResumen(){
  const leadsBy=await this._leadsMes();
  const cuentas=await api('nc_mkt_cuentas?select=cliente,seguidores&limit=500');
  const inf=(await api('nc_infra?select=*&limit=1'))[0]||null;
  const segBy={}; cuentas.forEach(c=>segBy[c.cliente]=(segBy[c.cliente]||0)+(+c.seguidores||0));
  const emp=[
   {n:'Feroz',bot:'feroz',d:'Botas de dotación · distribuidores',u:'https://negocioscuanticoscol-create.github.io/plataforma-nc/?empresa=feroz'},
   {n:'Smart',bot:'smart',d:'Envases herméticos · B2B',u:'https://negocioscuanticoscol-create.github.io/plataforma-nc/?empresa=smart'},
   {n:'KRUH',bot:null,d:'Panadería → restaurante',u:'https://negocioscuanticoscol-create.github.io/plataforma-nc/kruh/'},
   {n:'Epheta',bot:null,d:'Aseo · en construcción',u:null},
   {n:'FES Fueling',bot:null,d:'ERP repuestos cisternas',u:'https://negocioscuanticoscol-create.github.io/plataforma-nc/fesfueling/'},
   {n:'ZARRAT',bot:null,d:'Atelier de moda a la medida',u:'https://negocioscuanticoscol-create.github.io/plataforma-nc/zarrat/'},
  ];
  const totLeads=(leadsBy.smart||0)+(leadsBy.feroz||0);
  const totSeg=cuentas.reduce((a,c)=>a+(+c.seguidores||0),0);
  $('main').innerHTML=`<h1>📊 Resumen · todas las empresas</h1>
    <div class="sub">La foto de Negocios Cuánticos en un vistazo.</div>
    <div class="kpis">
      <div class="kpi ok"><b>${nm(totLeads)}</b><span>Leads de bots este mes</span></div>
      <div class="kpi acc"><b>${nm(totSeg)}</b><span>Seguidores (total)</span></div>
      <div class="kpi azul"><b>${emp.length}</b><span>Empresas</span></div>
    </div>
    <div class="emp">${emp.map(e=>{ const lm=e.bot?(leadsBy[e.bot]||0):null; const seg=segBy[e.n]||0;
      return `<div class="empc" ${e.u?`onclick="window.open('${e.u}','_blank')" style="cursor:pointer"`:''}>
        <div class="en">${esc(e.n)}</div><div class="ed">${esc(e.d)}</div>
        <div style="display:flex;gap:14px;margin-top:10px;font-size:12.5px">
          ${lm!=null?`<span>💬 <b style="color:var(--ok)">${nm(lm)}</b> leads/mes</span>`:'<span style="color:var(--faint)">sin bot</span>'}
          ${seg?`<span>👥 <b>${nm(seg)}</b></span>`:''}</div>
        ${e.u?'<span class="go">Abrir →</span>':''}</div>`; }).join('')}</div>
    ${inf?(()=>{ const bar=(pct,warn80)=>`<div style="height:9px;background:#ece8e0;border-radius:6px;overflow:hidden;margin-top:5px"><i style="display:block;height:100%;width:${Math.min(100,pct)}%;background:${pct>=80?'#d22':(pct>=60?'#e8a30c':'#2e9e4f')}"></i></div>`;
      const cli=Object.entries(inf.por_cliente||{}).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${esc(k)} <b>${v}MB</b>`).join(' · ');
      const alerta=inf.db_pct>=80||inf.storage_pct>=80;
      return `<div class="card" style="margin-top:16px;${alerta?'border-left:4px solid #d22':''}">
        <b>🗄️ Infraestructura (Supabase)</b> <span style="font-size:11px;color:var(--faint)">· actualizado ${new Date(inf.actualizado).toLocaleString('es-CO',{dateStyle:'short',timeStyle:'short'})} · el vigilante avisa al 80%</span>
        <div style="display:flex;gap:18px;flex-wrap:wrap;margin-top:10px">
          <div style="flex:1;min-width:190px"><div style="font-size:12px;color:var(--faint)">Base de datos</div><div style="font-weight:800;font-size:19px">${inf.db_pct}% <small style="font-weight:400;color:var(--faint)">de 500 MB · ${inf.db_mb} MB</small></div>${bar(inf.db_pct)}</div>
          <div style="flex:1;min-width:190px"><div style="font-size:12px;color:var(--faint)">Storage</div><div style="font-weight:800;font-size:19px">${inf.storage_pct}% <small style="font-weight:400;color:var(--faint)">de 1 GB · ${inf.storage_mb} MB</small></div>${bar(inf.storage_pct)}</div>
        </div>
        <div style="font-size:12px;color:var(--faint);margin-top:11px">Peso por cliente: ${cli}</div></div>`; })():''}`;
},

async vMarketing(){
  const cuentas=await api('nc_mkt_cuentas?order=orden&limit=500');
  const leadsBy=await this._leadsMes();
  this._cuentas=cuentas; this._leadsBy=leadsBy;
  const clientes=[...new Set(cuentas.map(c=>c.cliente))];
  let sel=this._mkSel; if(!clientes.includes(sel)) sel=clientes[0];
  this._mkSel=sel;
  const totSeg=cuentas.reduce((a,c)=>a+(+c.seguidores||0),0);
  const totLeads=(leadsBy.smart||0)+(leadsBy.feroz||0);
  $('main').innerHTML=`<h1>📣 Marketing</h1>
    <div class="sub">Elige una marca y ve su marketing: redes, seguidores, pauta y agentes.</div>
    <div class="kpis">
      <div class="kpi acc"><b>${nm(totSeg)}</b><span>Seguidores (total)</span></div>
      <div class="kpi ok"><b>${nm(totLeads)}</b><span>Leads de bots este mes</span></div>
      <div class="kpi azul"><b>${clientes.length}</b><span>Marcas</span></div>
    </div>
    <div class="cajones">${clientes.map(cl=>`<button class="caj ${cl===sel?'on':''}" onclick="App.mkSel('${esc(cl)}')">${esc(cl)}</button>`).join('')}<button class="caj add" onclick="App.addCuenta()">＋ marca</button></div>
    ${sel?this._cardCliente(sel,cuentas.filter(c=>c.cliente===sel),leadsBy):'<div class="empty">Agrega tu primera marca.</div>'}`;
},
mkSel(cl){ this._mkSel=cl; this.vMarketing(); },
_cardCliente(cl, reds, leadsBy){
  const bot=(reds.find(r=>r.bot)||{}).bot;
  const leads=bot?(leadsBy[bot]||0):null;
  const seg=reds.reduce((a,r)=>a+(+r.seguidores||0),0);
  const agentes = bot
    ? `<span class="chip on">🤖 Bot de venta</span><span class="chip on">📊 Analista de pauta</span><span class="chip off">✍️ Contenido (por montar)</span><span class="chip off">💬 Engagement (por montar)</span>`
    : `<span class="chip off">🤖 Bot (por montar)</span><span class="chip off">✍️ Contenido</span>`;
  return `<div class="cli">
    <div class="top"><h2>${esc(cl)}</h2><span class="badge">${nm(seg)} seguidores</span></div>
    <div class="redes">${reds.map(r=>this._red(r)).join('')}</div>
    ${leads!=null?`<div class="pauta">
      <div>Leads del bot este mes · <b>${nm(leads)}</b></div>
      <div style="color:var(--sub)">objetivo pauta: <b style="color:var(--tx);font-size:13px">Mensajes</b></div></div>`:''}
    <div class="agentes">${agentes}</div>
  </div>`;
},
_red(r){
  const m=RED[r.red]||{c:'var(--sub)',ic:'🔗'};
  return `<div class="red">
    <div class="rh"><span class="dot" style="background:${m.c}"></span>${m.ic} ${esc(r.red)}</div>
    <input placeholder="@usuario / handle" value="${esc(r.handle||'')}" onchange="App.upd(${r.id},'handle',this.value)">
    <input placeholder="link (https://…)" value="${esc(r.url||'')}" onchange="App.upd(${r.id},'url',this.value)">
    <div class="seg">👥 <input type="number" value="${+r.seguidores||0}" onchange="App.upd(${r.id},'seguidores',this.value)"> seguidores
      ${r.url?`· <a class="open" href="${esc(r.url)}" target="_blank">abrir ↗</a>`:''}</div>
  </div>`;
},
async upd(id,campo,val){
  const b={}; b[campo]= campo==='seguidores' ? (+val||0) : val;
  await patch('nc_mkt_cuentas?id=eq.'+id,b);
  const c=(this._cuentas||[]).find(x=>x.id===id); if(c)c[campo]=b[campo];
  toast('Guardado');
  if(campo==='seguidores') this.vMarketing();
},
async addCuenta(){
  const cl=prompt('Marca / cliente (ej: Smart, Epheta, un cliente nuevo):'); if(!cl) return;
  const red=prompt('Red (Instagram, Facebook, TikTok, WhatsApp):','Instagram'); if(!red) return;
  await post('nc_mkt_cuentas',{cliente:cl.trim(),red:red.trim(),orden:99});
  toast('Agregada'); this.vMarketing();
},

vEmpresas(){
  const emp=[
   ['Feroz','Botas de dotación · distribuidores','https://negocioscuanticoscol-create.github.io/plataforma-nc/?empresa=feroz'],
   ['Smart','Envases herméticos · B2B','https://negocioscuanticoscol-create.github.io/plataforma-nc/?empresa=smart'],
   ['FES Fueling','ERP repuestos cisternas','https://negocioscuanticoscol-create.github.io/plataforma-nc/fesfueling/'],
   ['ZARRAT','Atelier de moda a la medida','https://negocioscuanticoscol-create.github.io/plataforma-nc/zarrat/'],
  ];
  $('main').innerHTML=`<h1>🏢 Empresas</h1><div class="sub">Entra a la operación de cada una.</div>
    <div class="emp">${emp.map(([n,d,u])=>`<a class="empc" href="${u}" target="_blank"><div class="en">${esc(n)}</div><div class="ed">${esc(d)}</div><span class="go">Abrir →</span></a>`).join('')}</div>`;
},

vAgentes(){
  const ag=[
   ['🤖 Valentina (Smart)','Vende el kit por WhatsApp, detecta pagos, reengancha','on'],
   ['🛡️ Sofía (Feroz)','Capta distribuidores, pide ciudad+empresa, handoff al gerente','on'],
   ['📊 Analista de Pauta','Cada mañana 8am: qué anuncio deja/quita + alertas','on'],
   ['💰 Detector de pagos','Comprobante → alerta + cotización del kit automática','on'],
   ['🔁 Recompra +15 días','Guía registrada → reenganche de recompra','on'],
   ['✍️ Agente de Contenido','Calendario + arma posts por marca','off'],
   ['💬 Agente de Engagement','Comentario → DM → bot de venta','off'],
   ['👔 Gerente de Marketing','Junta todo y da una sola lectura diaria','off'],
  ];
  $('main').innerHTML=`<h1>🤖 Agentes</h1><div class="sub">El equipo de IA de NC · verde = activo · morado = por montar.</div>
    <div class="aglist">${ag.map(([n,d,st])=>`<div class="ag"><div><div class="an">${esc(n)}</div><div class="ad">${esc(d)}</div></div><span class="chip ${st}">${st==='on'?'● activo':'por montar'}</span></div>`).join('')}</div>`;
},
};
App.nav(); App.go('resumen');
</script>
</body>
</html>
