name: keep-alive-supabase

# Mantiene DESPIERTA la base de Supabase del proyecto (fnayedgvamxktxfvywwl).
# El plan Free pausa un proyecto tras ~7 días SIN peticiones. Este workflow le
# pega una consulta liviana a diario, así nunca llega a ese punto aunque nadie
# abra las apps. Corre solo en los servidores de GitHub — no depende de nadie.
#
# La llave es la publishable (pública, la misma que ya está en todos los HTML
# del repo): no es secreta, por eso va en texto. Es la ÚNICA base del proyecto;
# NUNCA apuntar a la otra base ("De Codabas a tu Casa", vacía y pausada).

on:
  schedule:
    - cron: '37 7 * * *'   # todos los días 7:37 UTC = 2:37 a. m. Bogotá
  workflow_dispatch:        # botón para correrlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping REST de Supabase
        run: |
          URL="https://fnayedgvamxktxfvywwl.supabase.co/rest/v1/config?select=key&limit=1"
          KEY="sb_publishable_NVTYNkJ0V6obLwgwjXza1g_3Ihp-xMv"
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" "$URL" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "Respuesta de Supabase: HTTP $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::La base NO respondió OK (HTTP $CODE) — revisar si está pausada o si cambió la llave."
            exit 1
          fi
          echo "Base despierta ✅"
